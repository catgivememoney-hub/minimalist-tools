<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist OS v8.CustomChat</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #222;
            --input-bg: #151515;
            --glow: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; font-family: "Inter", "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 18px; cursor: pointer; opacity: 0.3; transition: var(--transition); z-index: 1000; display: none; letter-spacing: 2px;}
        #back-btn:hover { opacity: 1; transform: translateX(-5px); }
        
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 10px; letter-spacing: 3px; opacity: 0.4; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: var(--transition); }
        .hidden { display: none !important; opacity: 0; }

        input { 
            background: var(--input-bg); border: 1px solid var(--border); color: #eee; padding: 12px 20px; outline: none; 
            transition: var(--transition); border-radius: 4px;
        }
        input:focus { border-color: #555; box-shadow: 0 0 20px var(--glow); }

        button { 
            background: var(--accent); border: 1px solid var(--border); color: var(--text); cursor: pointer; 
            padding: 10px 18px; transition: var(--transition); border-radius: 4px;
        }
        button:hover { background: #333; color: #fff; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }

        .container { 
            width: 95%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column; 
            animation: fadeInSlide 0.6s ease forwards; 
        }

        .res-section, .msg { animation: fadeInSlide 0.5s ease both; margin-bottom: 10px; }
        .calc-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 40px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-display { width: 100%; height: 70px; background: var(--input-bg); border: 1px solid var(--border); color: #fff; text-align: right; font-size: 2rem; padding: 15px; margin-bottom: 15px; border-radius: 4px; transition: transform 0.1s; }

        .draw-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; }
        canvas { background: #000; border: 1px solid var(--border); border-radius: 4px; cursor: crosshair; }

        .time-box { border: 1px solid var(--border); padding: 40px; text-align: center; background: rgba(255,255,255,0.01); flex: 1; }
        .big-clock { font-size: 5rem; font-weight: 100; color: #fff; margin: 25px 0; font-variant-numeric: tabular-nums; }

        #chat-log { flex: 1; overflow-y: auto; padding: 25px; border: 1px solid var(--border); background: var(--input-bg); margin-bottom: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { align-self: flex-end; background: #222; color: #fff; padding: 10px 15px; border-radius: 12px 12px 0 12px; }
        .ai-msg { align-self: flex-start; border-left: 3px solid #444; background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 12px; }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goHome()">BACK</div>
    <div id="la-timer">LA TIME 00:00:00</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 30px; opacity: 0.4; letter-spacing: 4px; font-size: 11px;">SYSTEM SECURE</div>
        <input type="text" id="main-cmd" placeholder="Enter Command..." autocomplete="off" style="width: 350px; text-align: center; font-size: 1.1rem; border-radius: 30px;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        let swInt = null, trInt = null, swMs = 0, trSec = 0;
        let drawHistory = [], drawStep = -1, currentMode = 'pen';

        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const apps = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat'];
                if (apps.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                appScreen.style.opacity = '1';
                backBtn.style.display = 'block';
                renderApp(type);
            }, 300);
        }

        function goHome() {
            appScreen.style.opacity = '0';
            setTimeout(() => {
                appScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                homeScreen.style.opacity = '1';
                backBtn.style.display = 'none';
                mainCmd.value = '';
                clearInterval(swInt); clearInterval(trInt);
            }, 300);
        }

        function renderApp(type) {
            appContent.innerHTML = '';
            if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
            else if(type === 'chat') initChat();
        }

        // --- 1. CHAT (逻辑更新) ---
        function initChat() {
            appContent.innerHTML = `
                <div id="chat-log"><div class="msg ai-msg">Identity encrypted. Start interaction.</div></div>
                <div style="display:flex; gap:12px;">
                    <input type="text" id="chat-in" placeholder="Query..." style="flex:1;">
                    <button id="chat-send">SEND</button>
                </div>`;
            const input = document.getElementById('chat-in');
            const log = document.getElementById('chat-log');
            input.focus();

            const send = () => {
                const m = input.value.trim(); if(!m) return;
                const uMsg = document.createElement('div'); uMsg.className='msg user-msg'; uMsg.innerText=m;
                log.appendChild(uMsg); 
                input.value='';

                setTimeout(() => {
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg';
                    
                    // 特殊逻辑判断
                    if (m === 'Jefferson') {
                        aMsg.innerText = "I love you Presley";
                    } else if (m === 'Presley') {
                        aMsg.innerText = "She‘s not here";
                    } else if (m === '15') {
                        aMsg.innerText = "basketball will be better after 18";
                    } else if (m === '16') {
                        aMsg.innerText = "sure I do like this one";
                    } else {
                        aMsg.innerText = "guess who am I";
                    }

                    log.appendChild(aMsg);
                    log.scrollTop = log.scrollHeight;
                }, 500);
            };
            document.getElementById('chat-send').onclick = send;
            input.onkeypress = (e) => { if(e.key==='Enter') send(); };
        }

        // --- 2. VOCABULARY ---
        function initVocab() {
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="Search..." style="width:100%; font-size:1.4rem;"><div id="v-res"></div>`;
            const vin = document.getElementById('v-in'); vin.focus();
            vin.onkeypress = async (e) => {
                if(e.key !== 'Enter') return;
                const word = vin.value.trim();
                const res = document.getElementById('v-res'); res.innerHTML = "Searching...";
                try {
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await r.json();
                    const m = data[0].meanings[0];
                    res.innerHTML = `
                        <h2 style="font-size:3rem; margin:20px 0; color:#fff;">${word}</h2>
                        <div class="res-section" style="animation-delay:0.1s"><strong>[${m.partOfSpeech}]</strong></div>
                        <div class="res-section" style="animation-delay:0.2s"><small>DEFINITION:</small><br>${m.definitions[0].definition}</div>
                        <div class="res-section" style="animation-delay:0.3s; font-style:italic; opacity:0.6;">"${m.definitions[0].example || 'No example available.'}"</div>`;
                } catch { res.innerHTML = "Not found."; }
            };
        }

        // --- 3. CALCULATOR ---
        let calcExp = "";
        function initCalc() {
            appContent.innerHTML = `
                <div class="calc-wrapper">
                    <div>
                        <div id="c-out" class="calc-display">0</div>
                        <div class="calc-grid">
                            ${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k => {
                                let label = k.replace('Math.','');
                                return `<button onclick="doCalc('${k}')">${label}</button>`;
                            }).join('')}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <canvas id="c-pad" width="650" height="480"></canvas>
                        <button onclick="clearCanvas('c-pad')" style="margin-top:15px;">CLEAR PAD</button>
                    </div>
                </div>`;
            initSketch('c-pad');
        }
        window.doCalc = (k) => {
            const out = document.getElementById('c-out');
            out.style.transform = "scale(1.05)"; setTimeout(() => out.style.transform = "scale(1)", 100);
            if(k === '=') { try { calcExp = eval(calcExp); } catch { calcExp = "Error"; } }
            else if(k === 'C') calcExp = ""; else calcExp += k;
            out.innerText = calcExp || "0";
        };

        // --- 4. DRAWING ---
        function initDrawing() {
            appContent.innerHTML = `
                <div class="draw-bar">
                    <input type="color" id="d-col" value="#ffffff">
                    <button onclick="currentMode='pen'">PEN</button>
                    <button onclick="currentMode='eraser'">ERASER</button>
                    <input type="range" id="d-sz" min="1" max="60" value="3">
                    <div style="flex:1"></div>
                    <button onclick="undo()">UNDO</button>
                    <button onclick="clearCanvas('d-can')">CLEAR</button>
                    <button onclick="saveD()" style="background:#fff; color:#000;">SAVE</button>
                </div>
                <canvas id="d-can" width="1050" height="520"></canvas>`;
            initSketch('d-can', true);
        }

        // --- 5. TIMING ---
        function initTiming() {
            appContent.innerHTML = `
                <div style="display:flex; gap:40px; width:100%;">
                    <div class="time-box"><h3>STOPWATCH</h3><div id="sw" class="big-clock">00:00:00</div>
                        <button onclick="swFunc('start')">START</button><button onclick="swFunc('stop')">STOP</button><button onclick="swFunc('reset')">RESET</button>
                    </div>
                    <div class="time-box"><h3>TIMER</h3><div id="tr" class="big-clock">00:00:00</div>
                        <input type="number" id="tr-in" placeholder="Mins" style="width:100px; text-align:center; margin-bottom:15px;"><br>
                        <button onclick="trFunc('start')">START</button>
                    </div>
                </div>`;
        }
        window.swFunc = (a) => {
            const d = document.getElementById('sw');
            if(a==='start'){ if(swInt)return; swInt=setInterval(()=>{swMs+=1000; d.innerText=new Date(swMs).toISOString().substr(11,8)},1000); }
            else if(a==='stop'){ clearInterval(swInt); swInt=null; }
            else { clearInterval(swInt); swInt=null; swMs=0; d.innerText="00:00:00"; }
        };
        window.trFunc = (a) => {
            const d = document.getElementById('tr');
            clearInterval(trInt); trSec = (parseInt(document.getElementById('tr-in').value)||0)*60;
            trInt = setInterval(()=>{
                if(trSec<=0){ clearInterval(trInt); alert("Time's up!"); return; }
                trSec--; let m=Math.floor(trSec/60), s=trSec%60;
                d.innerText=`00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            },1000);
        };

        // --- 6. WEATHER ---
        function initWeather() {
            let off = 0;
            const update = () => {
                const label = off === 0 ? "TODAY" : (off === -1 ? "YESTERDAY" : "TOMORROW");
                appContent.style.opacity = '0';
                setTimeout(() => {
                    appContent.innerHTML = `<div style="text-align:center;"><h2 style="opacity:0.3; letter-spacing:5px;">${label}</h2><div style="font-size:8rem; font-weight:100; margin:30px 0; color:#fff;">${22+off}°C</div><p>LOS ANGELES</p>
                    <div style="margin-top:50px;"><button onclick="wMove(-1)">PREV</button> <button onclick="wMove(1)">NEXT</button></div></div>`;
                    appContent.style.opacity = '1';
                }, 200);
            };
            window.wMove = (n) => { off=Math.max(-1, Math.min(1, off+n)); update(); }; update();
        }

        // --- SKETCH LOGIC ---
        function initSketch(id, isFull = false) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            let drawing = false;
            if(isFull) { drawHistory = [c.toDataURL()]; drawStep = 0; }
            c.onmousedown = (e) => { 
                drawing = true; ctx.beginPath(); 
                const r = c.getBoundingClientRect(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top); 
            };
            c.onmouseup = () => { 
                if(drawing && isFull) { drawStep++; drawHistory.push(c.toDataURL()); }
                drawing = false; 
            };
            c.onmousemove = (e) => {
                if(!drawing) return;
                const r = c.getBoundingClientRect();
                ctx.lineWidth = isFull ? document.getElementById('d-sz').value : 2;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = (isFull && currentMode==='eraser') ? '#0d0d0d' : (isFull ? document.getElementById('d-col').value : '#444');
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
            };
            window.undo = () => { if(drawStep>0){ drawStep--; let i=new Image(); i.src=drawHistory[drawStep]; i.onload=()=> {ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(i,0,0);}}; };
            window.clearCanvas = (cid) => { 
                const tc = document.getElementById(cid); tc.getContext('2d').clearRect(0,0,tc.width,tc.height);
                if(isFull) { drawHistory=[tc.toDataURL()]; drawStep=0; } 
            };
            window.saveD = () => { const l=document.createElement('a'); l.download='sketch.png'; l.href=c.toDataURL(); l.click(); };
        }

        setInterval(() => {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME ${now}`;
        }, 1000);
    </script>
</body>
</html>
