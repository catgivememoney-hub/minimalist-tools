<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive v18 // Avant-Garde</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #444;
            --accent: #fff;
            --curve: cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--p); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* UI HUD - 极致简约 */
        #hud { position: fixed; top: 50px; left: 50px; right: 50px; display: flex; justify-content: space-between; align-items: baseline; z-index: 1000; pointer-events: none; }
        #exit-btn { 
            pointer-events: auto; font-size: 11px; font-weight: 900; letter-spacing: 5px; 
            color: var(--p); cursor: pointer; opacity: 0; transition: 0.5s var(--curve);
            text-transform: uppercase; display: inline-block;
        }
        #exit-btn::after { content: ''; display: block; width: 0; height: 2px; background: #fff; transition: 0.3s var(--curve); margin-top: 4px; }
        #exit-btn:hover::after { width: 100%; }
        #exit-btn.active { opacity: 1; }
        #la-time { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--s); letter-spacing: 2px; }

        /* 屏显逻辑 */
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 1.2s var(--curve); }
        .hidden { opacity: 0; transform: scale(1.05); pointer-events: none; filter: blur(20px); }
        
        .container { width: 80%; max-width: 1400px; display: flex; flex-direction: column; }

        /* Typography - 极粗Black体 */
        .big-title { font-size: 12rem; font-weight: 900; letter-spacing: -10px; line-height: 0.8; margin: 0; }
        .tagline { font-size: 12px; font-weight: 700; letter-spacing: 12px; color: var(--s); text-transform: uppercase; margin-bottom: 20px; }

        /* Input Styles */
        #cmd-input { 
            background: transparent; border: none; color: #fff; padding: 20px 0; 
            font-size: 4rem; font-weight: 900; width: 100%; max-width: 800px;
            text-align: left; outline: none; transition: 0.6s var(--curve);
            border-bottom: 8px solid #111;
        }
        #cmd-input:focus { border-bottom-color: #fff; }

        /* Global Buttons */
        button { 
            background: transparent; border: 1px solid var(--s); color: #fff; 
            padding: 10px 20px; font-size: 10px; font-weight: 900; letter-spacing: 3px; 
            cursor: pointer; transition: 0.3s; margin-right: 10px;
        }
        button:hover { border-color: #fff; background: #fff; color: #000; }

        /* Drawing Specific */
        #draw-tools { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: 0.5s var(--curve); background: #111; padding: 15px 30px; border-radius: 0 0 10px 10px; z-index: 1001; pointer-events: auto; }
        #app-screen:hover #draw-tools { top: 0; }

        /* Chat Layout */
        #chat-flow { flex: 1; height: 60vh; overflow-y: auto; padding-right: 40px; }
        .chat-row { margin-bottom: 60px; display: flex; flex-direction: column; }
        .chat-row.user { align-items: flex-end; }
        .chat-row .label { font-size: 10px; font-weight: 900; color: var(--s); margin-bottom: 10px; letter-spacing: 2px; }
        .chat-row .text { font-size: 2.5rem; font-weight: 900; line-height: 1; max-width: 80%; letter-spacing: -1px; }
    </style>
</head>
<body onclick="initAudio()">

    <div id="hud">
        <div id="exit-btn" onclick="exit()">Exit</div>
        <div id="la-time">LA 00:00:00</div>
    </div>

    <div id="home-screen" class="screen">
        <div class="container">
            <div class="tagline">System Entry</div>
            <input type="text" id="cmd-input" placeholder="COMMAND_" autocomplete="off" autofocus>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="draw-tools"></div> <div id="app-content" class="container"></div>
    </div>

    <script>
        // --- 音效与导航 ---
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const o = aCtx.createOscillator(); const g = aCtx.createGain();
            o.type = 'square'; o.frequency.setValueAtTime(100, aCtx.currentTime);
            g.gain.setValueAtTime(0.05, aCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, aCtx.currentTime + 0.05);
            o.connect(g); g.connect(aCtx.destination); o.start(); o.stop(aCtx.currentTime + 0.05);
        }
        function initAudio() { aCtx.resume(); document.body.onclick = null; }

        const cmdInput = document.getElementById('cmd-input');
        const appContent = document.getElementById('app-content');
        
        cmdInput.addEventListener('input', playTick);
        cmdInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdInput.value.toLowerCase().trim();
                const valid = ['hello','drawing','timing','chat','vocabulary','weather','calculator'];
                if(valid.includes(val)) launch(val);
            }
        });

        function launch(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('exit-btn').classList.add('active');
            renderApp(type);
        }

        function exit() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('active');
            document.getElementById('draw-tools').innerHTML = '';
            cmdInput.value = '';
            clearInterval(clockInt);
        }

        function renderApp(type) {
            appContent.innerHTML = '';
            if(type === 'hello') {
                appContent.innerHTML = `
                    <div class="tagline">Introduction</div>
                    <div class="big-title">Hello.</div>
                    <p style="font-size: 2rem; font-weight: 900; color: #555; max-width: 800px; margin-top: 40px; line-height: 1.1;">
                        This is a sanctuary built on the philosophy of subtraction. No noise. No clutter. Just focus.
                    </p>`;
            } else if(type === 'timing') {
                appContent.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 80px;">
                        <div>
                            <div class="tagline">Stopwatch</div>
                            <div id="sw-h" class="big-title" style="font-size:15rem">00:00</div>
                            <div style="margin-top:20px"><button onclick="sw('start')">RUN</button><button onclick="sw('stop')">HALT</button></div>
                        </div>
                        <div>
                            <div class="tagline">Timer</div>
                            <div id="tr-h" class="big-title" style="font-size:15rem; color:#222">00:00</div>
                            <div style="margin-top:20px">
                                <input type="number" id="tr-in" placeholder="MINS" style="background:transparent; border:none; border-bottom:4px solid #222; color:#fff; font-size:2rem; font-weight:900; width:150px; outline:none; margin-right:20px">
                                <button onclick="tr()">SET_AND_RUN</button>
                            </div>
                        </div>
                    </div>`;
            } else if(type === 'drawing') {
                document.getElementById('draw-tools').innerHTML = `
                    <button onclick="dMode='pen'">PEN</button>
                    <button onclick="dMode='eraser'">ERASER</button>
                    <input type="range" id="d-size" min="1" max="100" value="3" style="vertical-align:middle; margin:0 20px">
                    <button onclick="dUndo()">UNDO</button>
                    <button onclick="dSave()" style="background:#fff; color:#000">SAVE</button>
                `;
                appContent.innerHTML = `<canvas id="canvas" width="1400" height="700" style="border:1px solid #111; cursor:crosshair;"></canvas>`;
                initDrawLogic();
            } else if(type === 'chat') {
                appContent.innerHTML = `
                    <div id="chat-flow"></div>
                    <input type="text" id="chat-in" placeholder="REPLY_" style="background:transparent; border:none; border-bottom:4px solid #222; color:#fff; font-size:2rem; font-weight:900; width:100%; outline:none; padding:20px 0;">
                `;
                initChatLogic();
            } else if(type === 'vocabulary') {
                appContent.innerHTML = `
                    <input type="text" id="v-in" placeholder="ENTER WORD_" style="background:transparent; border:none; border-bottom:4px solid #222; color:#fff; font-size:4rem; font-weight:900; width:100%; outline:none; padding:20px 0;">
                    <div id="v-out" style="margin-top:50px"></div>
                `;
                const vin = document.getElementById('v-in'); vin.focus();
                vin.onkeypress = async (e) => {
                    if(e.key === 'Enter') {
                        const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${vin.value}`);
                        const d = await r.json();
                        if(d[0]) {
                            const def = d[0].meanings[0].definitions[0].definition;
                            const zh = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(def)}&langpair=en|zh-CN`).then(res=>res.json());
                            document.getElementById('v-out').innerHTML = `<div class="big-title" style="font-size:8rem">${vin.value}</div><p style="font-size:2.5rem; font-weight:900; margin-top:30px; line-height:1.2">${def}<br><span style="color:#444">${zh.responseData.translatedText}</span></p>`;
                        }
                    }
                }
            } else if(type === 'weather') {
                let wIdx = 1;
                const updateW = () => {
                    const data = [{l:'YESTERDAY', t:19}, {l:'TODAY', t:22}, {l:'TOMORROW', t:24}];
                    appContent.innerHTML = `<div class="tagline">${data[wIdx].l}</div><div class="big-title" style="font-size:18rem">${data[wIdx].t}°C</div><div class="tagline" style="margin-top:40px">Los Angeles</div><div style="margin-top:40px"><button onclick="shiftW(-1)">PREV</button><button onclick="shiftW(1)">NEXT</button></div>`;
                };
                window.shiftW = (n) => { wIdx = Math.max(0, Math.min(2, wIdx + n)); updateW(); };
                updateW();
            } else if(type === 'calculator') {
                appContent.innerHTML = `<div id="c-res" class="big-title" style="font-size:10rem; text-align:right; margin-bottom:50px">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px">${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="cExe('${k}')" style="font-size:1.5rem; padding:30px">${k.replace('Math.','')}</button>`).join('')}</div>`;
            }
        }

        // --- 功能逻辑集 ---
        let swMs = 0, clockInt = null;
        window.sw = (a) => {
            if(a==='start') { if(!clockInt) clockInt = setInterval(()=>{swMs++; document.getElementById('sw-h').innerText=new Date(swMs*1000).toISOString().substr(14,5)},1000); }
            else { clearInterval(clockInt); clockInt=null; }
        };
        window.tr = () => {
            clearInterval(clockInt);
            let s = (parseInt(document.getElementById('tr-in').value) || 0) * 60;
            const h = document.getElementById('tr-h'); h.style.color = '#fff';
            clockInt = setInterval(() => {
                if(s<=0) { clearInterval(clockInt); alert("DONE"); return; }
                s--; let m = Math.floor(s/60), sec = s%60;
                h.innerText = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }, 1000);
        };

        function initDrawLogic() {
            const c = document.getElementById('canvas'), ctx = c.getContext('2d');
            let drawing = false, hist = [];
            window.dMode = 'pen';
            const save = () => { hist.push(c.toDataURL()); if(hist.length > 20) hist.shift(); };
            save();
            c.onmousedown = (e) => { drawing = true; ctx.beginPath(); const r = c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) save(); drawing = false; };
            c.onmousemove = (e) => {
                if(!drawing) return;
                const r = c.getBoundingClientRect();
                ctx.lineWidth = document.getElementById('d-size').value;
                ctx.strokeStyle = dMode === 'eraser' ? '#000' : '#fff';
                ctx.lineCap = 'round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.dUndo = () => { if(hist.length>1) { hist.pop(); let i = new Image(); i.src = hist[hist.length-1]; i.onload=()=> { ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(i,0,0); } } };
            window.dSave = () => { const l = document.createElement('a'); l.download='art.png'; l.href=c.toDataURL(); l.click(); };
        }

        function initChatLogic() {
            const input = document.getElementById('chat-in');
            const flow = document.getElementById('chat-flow');
            input.focus();
            input.onkeypress = (e) => {
                if(e.key === 'Enter') {
                    const txt = input.value.trim(); if(!txt) return;
                    flow.innerHTML += `<div class="chat-row user"><div class="label">USER</div><div class="text">${txt}</div></div>`;
                    input.value = '';
                    setTimeout(() => {
                        let res = "guess who am I";
                        if(txt === 'Jefferson') res = "I love you Presley";
                        else if(txt === 'Presley') res = "She‘s not here";
                        else if(txt === '15') res = "basketball will be better after 18";
                        else if(txt === '16') res = "sure I do like this one";
                        flow.innerHTML += `<div class="chat-row"><div class="label">ARCHIVE_AI</div><div class="text">${res}</div></div>`;
                        flow.scrollTop = flow.scrollHeight;
                    }, 400);
                }
            };
        }

        let cExp = "";
        window.cExe = (k) => { playTick(); if(k==='C') cExp=""; else if(k==='=') cExp=eval(cExp).toString(); else cExp+=k; document.getElementById('c-res').innerText = cExp || "0"; };

        setInterval(() => {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-time').innerText = `LA ${now}`;
        }, 1000);
    </script>
</body>
</html>
