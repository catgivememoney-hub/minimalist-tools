<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist OS v11.Audio</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #222;
            --input-bg: #151515;
            --glow: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; font-family: "Inter", "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 18px; cursor: pointer; opacity: 0.3; transition: var(--transition); z-index: 1000; display: none; letter-spacing: 2px;}
        #back-btn:hover { opacity: 1; transform: translateX(-5px); }
        
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 10px; letter-spacing: 3px; opacity: 0.4; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: var(--transition); }
        .hidden { display: none !important; opacity: 0; }

        input { 
            background: var(--input-bg); border: 1px solid var(--border); color: #eee; padding: 12px 20px; outline: none; 
            transition: var(--transition); border-radius: 4px;
        }
        input:focus { border-color: #555; box-shadow: 0 0 20px var(--glow); }

        button { 
            background: var(--accent); border: 1px solid var(--border); color: var(--text); cursor: pointer; 
            padding: 10px 18px; transition: var(--transition); border-radius: 4px;
        }
        button:hover { background: #333; color: #fff; transform: translateY(-2px); }

        .container { 
            width: 95%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column; 
            animation: fadeInSlide 0.6s ease forwards; 
        }

        .intro-text { text-align: center; max-width: 600px; line-height: 1.8; }
        .intro-title { font-size: 3.5rem; font-weight: 100; color: #fff; margin-bottom: 20px; letter-spacing: -1px; }

        .res-section, .msg { animation: fadeInSlide 0.5s ease both; margin-bottom: 10px; }
        .zh-text { color: #666; font-size: 0.95rem; margin-top: 4px; }

        .calc-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 40px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-display { width: 100%; height: 70px; background: var(--input-bg); border: 1px solid var(--border); color: #fff; text-align: right; font-size: 2rem; padding: 15px; margin-bottom: 15px; border-radius: 4px; }

        .draw-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; }
        canvas { background: #000; border: 1px solid var(--border); border-radius: 4px; }

        .time-box { border: 1px solid var(--border); padding: 40px; text-align: center; background: rgba(255,255,255,0.01); flex: 1; }
        .big-clock { font-size: 5rem; font-weight: 100; color: #fff; margin: 25px 0; font-variant-numeric: tabular-nums; }

        #chat-log { flex: 1; overflow-y: auto; padding: 25px; border: 1px solid var(--border); background: var(--input-bg); margin-bottom: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { align-self: flex-end; background: #222; color: #fff; padding: 10px 15px; border-radius: 12px 12px 0 12px; }
        .ai-msg { align-self: flex-start; border-left: 3px solid #444; background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 12px; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="back-btn" onclick="goHome()">BACK</div>
    <div id="la-timer">LA TIME 00:00:00</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 30px; opacity: 0.4; letter-spacing: 4px; font-size: 11px;">SYSTEM READY</div>
        <input type="text" id="main-cmd" placeholder="Enter Command..." autocomplete="off" style="width: 350px; text-align: center; font-size: 1.1rem; border-radius: 30px;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        // 音效配置
        const clickSound = new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTdvT19hc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rh");
        clickSound.volume = 0.2;

        function playKey() {
            clickSound.currentTime = 0;
            clickSound.play();
        }

        // 浏览器要求用户交互后才能播放声音
        function enableAudio() { document.body.onclick = null; }

        function attachKeySound(el) {
            if(!el) return;
            el.addEventListener('input', playKey);
        }

        attachKeySound(mainCmd);

        let swInt = null, trInt = null, swMs = 0, trSec = 0;
        let drawHistory = [], drawStep = -1, currentMode = 'pen';

        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const apps = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat', 'hello'];
                if (apps.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                appScreen.style.opacity = '1';
                backBtn.style.display = 'block';
                renderApp(type);
            }, 300);
        }

        function goHome() {
            appScreen.style.opacity = '0';
            setTimeout(() => {
                appScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                homeScreen.style.opacity = '1';
                backBtn.style.display = 'none';
                mainCmd.value = '';
                clearInterval(swInt); clearInterval(trInt);
            }, 300);
        }

        function renderApp(type) {
            appContent.innerHTML = '';
            if(type === 'hello') initHello();
            else if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
            else if(type === 'chat') initChat();
        }

        function initHello() {
            appContent.style.justifyContent = "center";
            appContent.style.alignItems = "center";
            appContent.innerHTML = `<div class="intro-text"><div class="intro-title">Minimalist Tools</div><p style="opacity:0.6; letter-spacing:1px; margin-bottom:40px;">VERSION 11.0 // LOS ANGELES</p><div class="res-section">Designed for deep focus and digital peace.</div></div>`;
        }

        async function getZH(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-CN`);
                const data = await res.json(); return data.responseData.translatedText;
            } catch { return ""; }
        }

        function initVocab() {
            appContent.style.justifyContent = "flex-start";
            appContent.style.alignItems = "stretch";
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="Search word..." style="width:100%; font-size:1.4rem;"><div id="v-res"></div>`;
            const vin = document.getElementById('v-in');
            vin.focus();
            attachKeySound(vin);
            vin.onkeypress = async (e) => {
                if(e.key !== 'Enter') return;
                const word = vin.value.trim();
                const res = document.getElementById('v-res'); res.innerHTML = "Searching...";
                try {
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await r.json();
                    const m = data[0].meanings[0];
                    const def = m.definitions[0].definition;
                    const zhDef = await getZH(def);
                    res.innerHTML = `<h2 style="font-size:3rem; margin:20px 0; color:#fff;">${word}</h2><div class="res-section"><strong>[${m.partOfSpeech}]</strong></div><div class="res-section"><small>DEFINITION:</small><br>${def}<div class="zh-text">${zhDef}</div></div>`;
                } catch { res.innerHTML = "Not found."; }
            };
        }

        function initChat() {
            appContent.style.justifyContent = "flex-start";
            appContent.style.alignItems = "stretch";
            appContent.innerHTML = `<div id="chat-log"><div class="msg ai-msg">Identity Check Ready.</div></div><div style="display:flex; gap:12px;"><input type="text" id="chat-in" placeholder="Query..." style="flex:1;"><button id="chat-send">SEND</button></div>`;
            const cin = document.getElementById('chat-in');
            cin.focus();
            attachKeySound(cin);
            const send = () => {
                const m = cin.value.trim(); if(!m) return;
                const log = document.getElementById('chat-log');
                const uMsg = document.createElement('div'); uMsg.className='msg user-msg'; uMsg.innerText=m;
                log.appendChild(uMsg); cin.value='';
                setTimeout(() => {
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg';
                    if (m === 'Jefferson') aMsg.innerText = "I love you Presley";
                    else if (m === 'Presley') aMsg.innerText = "She‘s not here";
                    else if (m === '15') aMsg.innerText = "basketball will be better after 18";
                    else if (m === '16') aMsg.innerText = "sure I do like this one";
                    else aMsg.innerText = "guess who am I";
                    log.appendChild(aMsg); log.scrollTop = log.scrollHeight;
                }, 500);
            };
            document.getElementById('chat-send').onclick = send;
            cin.onkeypress = (e) => { if(e.key==='Enter') send(); };
        }

        // 基础模块 (计算器, 绘图, 计时, 天气)
        function initCalc() { 
            appContent.style.justifyContent = "flex-start";
            appContent.innerHTML = `<div class="calc-wrapper"><div><div id="c-out" class="calc-display">0</div><div class="calc-grid">${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k => `<button onclick="doCalc('${k}')">${k.replace('Math.','')}</button>`).join('')}</div></div><div><canvas id="c-pad" width="650" height="480"></canvas></div></div>`;
            initSketch('c-pad');
        }
        window.doCalc = (k) => {
            const out = document.getElementById('c-out'); playKey();
            if(k === 'C') calcExp = ""; else if(k === '=') try{calcExp=eval(calcExp)}catch{calcExp="Error"} else calcExp += k;
            out.innerText = calcExp || "0";
        };
        function initDrawing() { appContent.innerHTML = `<div class="draw-bar"><input type="color" id="d-col" value="#ffffff"><button onclick="currentMode='pen'">PEN</button><button onclick="currentMode='eraser'">ERASER</button><input type="range" id="d-sz" min="1" max="60" value="3"><button onclick="undo()">UNDO</button><button onclick="clearCanvas('d-can')">CLEAR</button></div><canvas id="d-can" width="1050" height="520"></canvas>`; initSketch('d-can', true); }
        function initTiming() { appContent.innerHTML = `<div style="display:flex; gap:40px;"><div class="time-box"><h3>STOPWATCH</h3><div id="sw" class="big-clock">00:00:00</div><button onclick="swFunc('start')">START</button><button onclick="swFunc('stop')">STOP</button></div><div class="time-box"><h3>TIMER</h3><div id="tr" class="big-clock">00:00:00</div><input type="number" id="tr-in" placeholder="Mins"><br><button onclick="trFunc('start')">START</button></div></div>`; attachKeySound(document.getElementById('tr-in')); }
        window.swFunc=(a)=>{if(a==='start'){swInt=setInterval(()=>{swMs+=1000;document.getElementById('sw').innerText=new Date(swMs).toISOString().substr(11,8)},1000)}else{clearInterval(swInt)}};
        window.trFunc=()=>{trSec=parseInt(document.getElementById('tr-in').value)*60;trInt=setInterval(()=>{if(trSec<=0)clearInterval(trInt);trSec--;let m=Math.floor(trSec/60),s=trSec%60;document.getElementById('tr').innerText=`00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`},1000)};
        function initWeather() { let update=()=>{appContent.innerHTML=`<div style="text-align:center;"><h2 style="opacity:0.3;">TODAY</h2><div style="font-size:8rem; color:#fff;">22°C</div><p>LOS ANGELES</p></div>`}; update(); }
        function initSketch(id, isFull=false) { const c=document.getElementById(id),ctx=c.getContext('2d'); let d=false; if(isFull){drawHistory=[c.toDataURL()];drawStep=0} c.onmousedown=(e)=>{d=true;ctx.beginPath();const r=c.getBoundingClientRect();ctx.moveTo(e.clientX-r.left,e.clientY-r.top)}; c.onmouseup=()=>{if(d&&isFull){drawStep++;drawHistory.push(c.toDataURL())};d=false}; c.onmousemove=(e)=>{if(!d)return;const r=c.getBoundingClientRect();ctx.lineWidth=isFull?document.getElementById('d-sz').value:2;ctx.strokeStyle=isFull?(currentMode==='eraser'?'#0d0d0d':document.getElementById('d-col').value):'#444';ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke()}; window.undo=()=>{if(drawStep>0){drawStep--;let i=new Image();i.src=drawHistory[drawStep];i.onload=()=>ctx.drawImage(i,0,0)}}; window.clearCanvas=(cid)=>{document.getElementById(cid).getContext('2d').clearRect(0,0,1050,520)}; }
        
        setInterval(() => {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME ${now}`;
        }, 1000);
    </script>
</body>
</html>
