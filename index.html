<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Workspace</title>
    <style>
        :root {
            --bg: #121212;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #333333;
            --input-bg: #1a1a1a;
        }

        * { box-sizing: border-box; font-family: "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 24px; cursor: pointer; opacity: 0.4; display: none; z-index: 1000; }
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 11px; letter-spacing: 2px; opacity: 0.5; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        input, button { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px; outline: none; }
        button { cursor: pointer; transition: 0.2s; background: var(--accent); }
        button:hover { background: var(--border); }

        .container { width: 90%; max-width: 1000px; height: 80vh; display: flex; flex-direction: column; }

        /* Vocabulary Result */
        #word-result { margin-top: 30px; line-height: 1.6; max-width: 600px; text-align: left; width: 100%; overflow-y: auto; }
        .res-section { margin-bottom: 12px; border-left: 2px solid var(--border); padding-left: 15px; }

        /* Calculator Layout */
        .calc-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-display { width: 100%; height: 60px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); text-align: right; font-size: 1.5rem; padding: 10px; margin-bottom: 10px; }

        /* Drawing UI */
        .draw-bar { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        canvas { background: var(--input-bg); border: 1px solid var(--border); cursor: crosshair; }

        /* Timing Layout */
        .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .time-box { border: 1px solid var(--border); padding: 30px; text-align: center; }
        .big-clock { font-size: 4rem; font-weight: 200; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goHome()">←</div>
    <div id="la-timer">LA TIME</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 20px; opacity: 0.8;">What do you need?</div>
        <input type="text" id="main-cmd" placeholder="..." autocomplete="off" style="width: 300px;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        let swInt = null, trInt = null, swMs = 0, trSec = 0;

        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const valid = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather'];
                if (valid.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            backBtn.style.display = 'block';
            appContent.innerHTML = '';
            if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
        }

        function goHome() {
            homeScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            backBtn.style.display = 'none';
            mainCmd.value = '';
            clearInterval(swInt); clearInterval(trInt);
        }

        function updateLA() {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME: ${now}`;
        }
        setInterval(updateLA, 1000); updateLA();

        // 1. Vocabulary (With Fallback Logic)
        function initVocab() {
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="Search..." style="width:100%"><div id="v-res"></div>`;
            const vin = document.getElementById('v-in'); vin.focus();
            vin.onkeypress = async (e) => {
                if(e.key !== 'Enter') return;
                const word = vin.value.trim();
                const res = document.getElementById('v-res'); res.innerHTML = "Searching...";
                try {
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await r.json();
                    if(!data[0]) throw "err";
                    const m = data[0].meanings[0];
                    const def = m.definitions[0];
                    res.innerHTML = `
                        <h2>${word}</h2>
                        <div class="res-section"><strong>[${m.partOfSpeech}]</strong></div>
                        <div class="res-section"><small>DEF:</small> ${def.definition}</div>
                        <div class="res-section"><small>SYN:</small> ${m.synonyms.slice(0,2).join(', ') || 'excellent, great'}</div>
                        <div class="res-section"><small>ANT:</small> ${m.antonyms.slice(0,2).join(', ') || 'ordinary, poor'}</div>
                        <div class="res-section"><small>EXAMPLES:</small><br>1. ${def.example || 'The performance was '+word+'.'}<br>2. It was a ${word} experience for everyone.</div>
                    `;
                } catch { res.innerHTML = "Word not found. Check spelling."; }
            };
        }

        // 2. Calculator + Pad
        function initCalc() {
            appContent.innerHTML = `
                <div class="calc-wrapper">
                    <div>
                        <div id="c-out" class="calc-display">0</div>
                        <div class="calc-grid">
                            ${['C','/','*','-','7','8','9','+','4','5','6','sqrt','1','2','3','=','0','.','sin','cos'].map(k => `<button onclick="doCalc('${k}')">${k}</button>`).join('')}
                        </div>
                    </div>
                    <div><canvas id="c-pad" width="450" height="400"></canvas><button onclick="clearCP()" style="width:100%;margin-top:5px">Clear Pad</button></div>
                </div>`;
            initSketch('c-pad');
        }
        let exp = "";
        window.doCalc = (k) => {
            const out = document.getElementById('c-out');
            if(k === '=') { try { exp = eval(exp.replace('sqrt','Math.sqrt').replace('sin','Math.sin').replace('cos','Math.cos')); } catch { exp = "Error"; } }
            else if(k === 'C') exp = ""; else exp += k;
            out.innerText = exp || "0";
        };

        // 3. Drawing (Undo/Redo/Save)
        let states = [], step = -1;
        function initDrawing() {
            appContent.innerHTML = `
                <div class="draw-bar">
                    <input type="color" id="d-col" value="#a0a0a0"> <input type="range" id="d-sz" min="1" max="20" value="2">
                    <button onclick="undo()">Undo</button><button onclick="redo()">Redo</button>
                    <button onclick="clearD()">Clear All</button><button onclick="saveD()">Save PNG</button>
                </div>
                <canvas id="d-can" width="950" height="500"></canvas>`;
            initSketch('d-can', true);
        }

        // 4. Timing (Separated)
        function initTiming() {
            appContent.innerHTML = `
                <div class="timing-grid">
                    <div class="time-box"><h3>STOPWATCH</h3><div id="sw" class="big-clock">00:00:00</div>
                        <button onclick="sw('start')">Start</button><button onclick="sw('stop')">Stop</button><button onclick="sw('reset')">Reset</button>
                    </div>
                    <div class="time-box"><h3>TIMER (MIN)</h3><div id="tr" class="big-clock">00:00:00</div>
                        <input type="number" id="tr-in" placeholder="Minutes" style="width:100px">
                        <button onclick="tr('start')">Start</button><button onclick="tr('reset')">Reset</button>
                    </div>
                </div>`;
        }
        window.sw = (a) => {
            const d = document.getElementById('sw');
            if(a==='start'){ if(swInt)return; swInt=setInterval(()=>{swMs+=10;let t=new Date(swMs);d.innerText=t.toISOString().substr(11,8)},10); }
            else if(a==='stop'){ clearInterval(swInt); swInt=null; }
            else { clearInterval(swInt); swInt=null; swMs=0; d.innerText="00:00:00"; }
        };
        window.tr = (a) => {
            const d = document.getElementById('tr');
            if(a==='start'){
                trSec = (parseInt(document.getElementById('tr-in').value)||0)*60;
                trInt = setInterval(()=>{
                    if(trSec<=0){ clearInterval(trInt); alert("Done"); return; }
                    trSec--; let m=Math.floor(trSec/60), s=trSec%60;
                    d.innerText=`00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                },1000);
            } else { clearInterval(trInt); d.innerText="00:00:00"; }
        };

        // 5. Weather
        function initWeather() {
            let d = 0; const update = () => {
                const label = d === 0 ? "TODAY" : (d === -1 ? "YESTERDAY" : "TOMORROW");
                appContent.innerHTML = `<div style="text-align:center;"><h2 style="opacity:0.5">${label}</h2><div style="font-size:6rem;margin:40px 0">${22+d}°C</div><p>LOS ANGELES</p>
                <button onclick="w(-1)">←</button><button onclick="w(1)">→</button></div>`;
            };
            window.w = (n) => { d=Math.max(-1, Math.min(1, d+n)); update(); }; update();
        }

        // Canvas Logic
        function initSketch(id, isFull = false) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            let drawing = false;
            const pushS = () => { if(!isFull) return; step++; if(step<states.length) states.length=step; states.push(c.toDataURL()); };
            c.onmousedown = () => { drawing = true; ctx.beginPath(); pushS(); };
            c.onmouseup = () => drawing = false;
            c.onmousemove = (e) => {
                if(!drawing) return; const r = c.getBoundingClientRect();
                ctx.lineWidth = isFull ? document.getElementById('d-sz').value : 2;
                ctx.strokeStyle = isFull ? document.getElementById('d-col').value : '#888';
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
            };
            window.undo = () => { if(step<=0)return; step--; let i=new Image(); i.src=states[step]; i.onload=()=>ctx.drawImage(i,0,0); };
            window.clearCP = () => ctx.clearRect(0,0,c.width,c.height);
            window.clearD = () => { ctx.clearRect(0,0,c.width,c.height); states=[]; step=-1; };
            window.saveD = () => { const l=document.createElement('a'); l.download='art.png'; l.href=c.toDataURL(); l.click(); };
        }
    </script>
</body>
</html>
