<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive OS v23 // Elite Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #333;
            --accent: rgba(255, 255, 255, 0.05);
            --ease: cubic-bezier(0.2, 1, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--p); 
            font-family: 'Lexend', sans-serif; overflow: hidden; 
        }

        /* 装饰性背景：扫描线 */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 999;
        }

        /* HUD */
        #hud { position: fixed; top: 40px; left: 40px; z-index: 1000; }
        #exit-btn { 
            font-size: 11px; font-weight: 500; letter-spacing: 2px; 
            color: var(--p); cursor: pointer; opacity: 0; transform: translateX(-20px);
            transition: 0.6s var(--ease); border: 1px solid var(--accent);
            padding: 10px 25px; border-radius: 50px; backdrop-filter: blur(10px);
        }
        #exit-btn.active { opacity: 1; transform: translateX(0); }
        #exit-btn:hover { background: #fff; color: #000; }

        /* 屏幕容器 */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 80px; transition: 1s var(--ease); }
        .hidden { opacity: 0; transform: scale(0.98); pointer-events: none; filter: blur(20px); }
        
        #home-screen { justify-content: center; align-items: center; }
        #cmd-in { 
            background: transparent; border: none; color: #fff; padding: 15px 0; 
            font-size: 2.2rem; font-weight: 800; width: 400px; text-align: center;
            outline: none; border-bottom: 2px solid var(--s); transition: 0.6s var(--ease);
        }
        #cmd-in:focus { width: 500px; border-bottom-color: #fff; }

        /* 通用排版 */
        .title { font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin: 0 0 40px 0; }
        button { 
            background: var(--accent); border: 1px solid transparent; color: #fff; 
            padding: 10px 22px; font-size: 11px; font-weight: 500; border-radius: 50px;
            cursor: pointer; transition: 0.3s var(--ease);
        }
        button:hover { background: #fff; color: #000; }

        /* Drawing / Canvas */
        .canvas-area { position: relative; flex: 1; border-radius: 24px; overflow: hidden; border: 1px solid var(--s); }
        canvas { background: #000; width: 100%; height: 100%; cursor: crosshair; }
        .tools { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }

        /* Timing */
        .time-display { font-family: 'JetBrains Mono'; font-size: 6rem; margin: 20px 0; }

        /* Weather 三段式 */
        .w-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 50px; }
        .w-item { padding: 30px; border-radius: 24px; border: 1px solid var(--accent); }
        .w-day { font-size: 12px; color: var(--s); text-transform: uppercase; margin-bottom: 10px; letter-spacing: 2px; }
        .w-temp { font-size: 3rem; font-weight: 800; }

        /* Calculator + Sketchbook */
        .calc-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; height: 60vh; }
        .sketch-box { border: 1px solid var(--s); border-radius: 24px; position: relative; background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <div id="hud">
        <div id="exit-btn" onclick="goHome()">Exit_Archive</div>
    </div>

    <div id="home-screen" class="screen">
        <input type="text" id="cmd-in" placeholder="Command..." autocomplete="off" autofocus>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="mount" style="height: 100%;"></div>
    </div>

    <script>
        const cmdIn = document.getElementById('cmd-in');
        const mount = document.getElementById('mount');
        const exitBtn = document.getElementById('exit-btn');
        let swInt, trInt;

        cmdIn.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdIn.value.toLowerCase().trim();
                const apps = ['drawing','timing','weather','chat','vocabulary','calculator','hello'];
                if(apps.includes(val)) launch(val);
            }
        });

        function launch(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            exitBtn.classList.add('active');
            render(type);
        }

        function goHome() {
            clearInterval(swInt); clearInterval(trInt);
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            exitBtn.classList.remove('active');
            cmdIn.value = '';
            setTimeout(() => cmdIn.focus(), 600);
        }

        function render(type) {
            mount.innerHTML = '';
            if(type === 'drawing') {
                mount.innerHTML = `
                    <div class="tools">
                        <button onclick="dMode='pen'">Pen</button>
                        <button onclick="dMode='eraser'">Eraser</button>
                        <input type="range" id="pen-size" min="1" max="50" value="2" style="width:100px">
                        <button onclick="dUndo('main')">Undo</button>
                        <button onclick="dClear('main')">Clear All</button>
                    </div>
                    <div class="canvas-area"><canvas id="can-main"></canvas></div>`;
                initDrawing('can-main');
            } else if(type === 'timing') {
                mount.innerHTML = `
                    <div class="title">Timing.</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:100px">
                        <div>
                            <div class="w-day">Stopwatch</div>
                            <div id="sw-v" class="time-display">00:00.0</div>
                            <button onclick="swAction('s')">Start</button>
                            <button onclick="swAction('p')">Pause</button>
                            <button onclick="swAction('r')">Reset</button>
                        </div>
                        <div>
                            <div class="w-day">Countdown</div>
                            <div id="tr-v" class="time-display" style="color:#222">00:00</div>
                            <input type="number" id="tr-i" placeholder="MINS" style="background:none; border:none; border-bottom:1px solid #333; color:#fff; font-size:1.5rem; width:80px; outline:none; margin-bottom:20px">
                            <br>
                            <button onclick="trAction('s')">Set</button>
                            <button onclick="trAction('r')">Reset</button>
                        </div>
                    </div>`;
            } else if(type === 'weather') {
                mount.innerHTML = `
                    <div class="title">Los Angeles.</div>
                    <div class="w-grid">
                        <div class="w-item"><div class="w-day">Yesterday</div><div class="w-temp">19°C</div></div>
                        <div class="w-item" style="border-color:#fff"><div class="w-day">Today</div><div id="w-curr" class="w-temp">0°C</div></div>
                        <div class="w-item"><div class="w-day">Tomorrow</div><div class="w-temp">24°C</div></div>
                    </div>`;
                let c=0; let itv=setInterval(()=>{if(c>=22){clearInterval(itv)} document.getElementById('w-curr').innerText=c+'°C'; c++},40);
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div class="calc-layout">
                        <div>
                            <div id="c-r" class="time-display" style="text-align:right; font-size:4rem">0</div>
                            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px">
                                ${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="calcE('${k}')" style="height:60px">${k.replace('Math.','')}</button>`).join('')}
                            </div>
                        </div>
                        <div class="sketch-box">
                            <div style="position:absolute; top:20px; left:20px; z-index:10; display:flex; gap:10px">
                                <button onclick="dUndo('calc')" style="padding:5px 15px; font-size:9px">Undo</button>
                                <button onclick="dClear('calc')" style="padding:5px 15px; font-size:9px">Clear</button>
                            </div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                initDrawing('can-calc');
            } else if(type === 'chat') {
                mount.innerHTML = `<div id="chat-l" style="height:60vh; overflow-y:auto; padding:20px"></div><input type="text" id="chat-i" placeholder="Message..." style="background:transparent; border:none; border-bottom:1px solid #222; color:#fff; font-size:1.5rem; width:100%; outline:none; padding:20px">`;
                initChat();
            } else if(type === 'vocabulary') {
                mount.innerHTML = `<input type="text" id="v-i" placeholder="English Word..." style="background:transparent; border:none; border-bottom:1px solid #222; color:#fff; font-size:4rem; font-weight:800; width:100%; outline:none;"><div id="v-o" style="margin-top:50px"></div>`;
                const vi=document.getElementById('v-i'); vi.focus();
                vi.onkeypress=async(e)=>{if(e.key==='Enter'){const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${vi.value}`); const d=await r.json(); if(d[0]){document.getElementById('v-o').innerHTML=`<div class="title">${vi.value}</div><p style="font-size:1.5rem; color:#666">${d[0].meanings[0].definitions[0].definition}</p>`}}}
            }
        }

        // --- Logic: Drawing & Undo ---
        let dMode = 'pen';
        let drawStates = { 'can-main': [], 'can-calc': [] };
        function initDrawing(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            const parent = c.parentElement;
            c.width = parent.offsetWidth; c.height = parent.offsetHeight;
            let active = false;
            const pushState = () => {
                if(drawStates[id].length > 20) drawStates[id].shift();
                drawStates[id].push(c.toDataURL());
            };
            pushState();
            c.onmousedown = (e) => { active=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(active) pushState(); active=false; };
            c.onmousemove = (e) => {
                if(!active) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = document.getElementById('pen-size')?.value || 2;
                ctx.strokeStyle = (dMode==='eraser' && id==='can-main') ? '#000' : '#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.dUndo = (type) => {
                const targetId = type === 'main' ? 'can-main' : 'can-calc';
                const canvas = document.getElementById(targetId);
                const context = canvas.getContext('2d');
                if(drawStates[targetId].length > 1) {
                    drawStates[targetId].pop();
                    let img = new Image(); img.src = drawStates[targetId][drawStates[targetId].length-1];
                    img.onload = () => { context.clearRect(0,0,canvas.width,canvas.height); context.drawImage(img,0,0); };
                }
            };
            window.dClear = (type) => {
                const targetId = type === 'main' ? 'can-main' : 'can-calc';
                const canvas = document.getElementById(targetId);
                canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
                drawStates[targetId] = []; pushState();
            };
        }

        // --- Logic: Timing ---
        let swMs=0;
        window.swAction=(a)=>{
            const v=document.getElementById('sw-v');
            if(a==='s' && !swInt) swInt=setInterval(()=>{swMs+=100; v.innerText=(swMs/1000).toFixed(1)+'s'},100);
            else if(a==='p'){clearInterval(swInt); swInt=null}
            else if(a==='r'){clearInterval(swInt); swInt=null; swMs=0; v.innerText="00:00.0"}
        };
        window.trAction=(a)=>{
            const v=document.getElementById('tr-v');
            if(a==='s'){
                clearInterval(trInt); let s=(parseInt(document.getElementById('tr-i').value)||0)*60;
                v.style.color="#fff";
                trInt=setInterval(()=>{if(s<=0){clearInterval(trInt); v.style.color="red"; return} s--; v.innerText=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`},1000);
            } else {clearInterval(trInt); v.innerText="00:00"; v.style.color="#222"}
        };

        // --- Logic: Chat ---
        function initChat(){
            const i=document.getElementById('chat-i'), l=document.getElementById('chat-l');
            i.onkeypress=(e)=>{if(e.key==='Enter' && i.value.trim()){
                l.innerHTML+=`<div style="margin-bottom:30px; text-align:right"><div class="w-day">You</div><div style="font-size:1.5rem; font-weight:800">${i.value}</div></div>`;
                const v=i.value; i.value='';
                setTimeout(()=>{
                    let r="System optimized."; if(v==='Jefferson') r="I love you Presley";
                    l.innerHTML+=`<div style="margin-bottom:30px"><div class="w-day">Archive</div><div style="font-size:1.5rem; color:#666">${r}</div></div>`;
                    l.scrollTop=l.scrollHeight;
                },400);
            }}
        }

        let calcV="";
        window.calcE=(k)=>{const r=document.getElementById('c-r'); if(k==='C')calcV=""; else if(k==='=')calcV=eval(calcV).toString(); else calcV+=k; r.innerText=calcV||"0"};
    </script>
</body>
</html>
