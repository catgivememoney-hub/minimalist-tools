<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive OS v24 // Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #222;
            --sub: #666;
            --accent: rgba(255, 255, 255, 0.03);
            --ease: cubic-bezier(0.2, 1, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--p); 
            font-family: 'Lexend', sans-serif; overflow: hidden; 
        }

        /* HUD - 极简导航 */
        #hud { position: fixed; top: 40px; left: 40px; z-index: 1000; }
        #exit-btn { 
            font-size: 11px; font-weight: 500; letter-spacing: 2px; color: var(--p);
            cursor: pointer; opacity: 0; transform: translateX(-20px);
            transition: 0.6s var(--ease); border: 1px solid var(--accent);
            padding: 10px 25px; border-radius: 50px; backdrop-filter: blur(10px);
        }
        #exit-btn.active { opacity: 1; transform: translateX(0); }
        #exit-btn:hover { background: #fff; color: #000; }

        /* 屏幕容器 */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 60px 80px; transition: 1s var(--ease); }
        .hidden { opacity: 0; transform: scale(0.98); pointer-events: none; filter: blur(20px); }
        
        #home-screen { justify-content: center; align-items: center; }
        #cmd-in { 
            background: transparent; border: none; color: #fff; padding: 15px 0; 
            font-size: 2.5rem; font-weight: 800; width: 450px; text-align: center;
            outline: none; border-bottom: 2px solid var(--s); transition: 0.6s var(--ease);
        }
        #cmd-in:focus { width: 550px; border-bottom-color: #fff; }

        /* 通用样式 */
        .title { font-size: 4rem; font-weight: 800; letter-spacing: -2px; margin: 0 0 20px 0; line-height: 1; }
        .subtitle { font-size: 1.2rem; color: var(--sub); line-height: 1.6; max-width: 600px; font-weight: 300; }
        button { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px 24px; font-size: 11px; font-weight: 500; border-radius: 50px;
            cursor: pointer; transition: 0.3s var(--ease);
        }
        button:hover { background: #fff; color: #000; }

        /* Drawing - 超大区域 */
        #draw-container { flex: 1; background: #050505; border-radius: 40px; border: 1px solid var(--s); position: relative; margin-top: 20px; overflow: hidden; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        /* Vocabulary - 深度解析排版 */
        .voc-card { margin-top: 40px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 60px; }
        .voc-meta { font-size: 0.9rem; color: var(--sub); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .voc-section { margin-bottom: 30px; }
        .voc-tag { display: inline-block; padding: 4px 12px; border-radius: 6px; background: var(--accent); font-size: 12px; margin-right: 10px; color: #fff; }

        /* Calculator Layout */
        .calc-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; height: 65vh; }
        .sketch-area { background: #050505; border-radius: 30px; border: 1px solid var(--s); position: relative; }

        /* Chat Flow */
        #chat-l { flex: 1; overflow-y: auto; padding-right: 20px; margin-bottom: 30px; }
        .chat-row { margin-bottom: 30px; }
        .chat-row.user { text-align: right; }
        .chat-bubble { display: inline-block; max-width: 80%; font-size: 1.6rem; font-weight: 600; line-height: 1.3; }
        .chat-label { font-size: 10px; color: var(--sub); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="exit-btn" onclick="goHome()">Exit_Back</div>
    </div>

    <div id="home-screen" class="screen">
        <input type="text" id="cmd-in" placeholder="Command..." autocomplete="off" autofocus>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="mount" style="height: 100%; display: flex; flex-direction: column;"></div>
    </div>

    <script>
        const cmdIn = document.getElementById('cmd-in');
        const mount = document.getElementById('mount');
        const exitBtn = document.getElementById('exit-btn');
        let swI, trI, dMode = 'pen';
        let stacks = { main: [], calc: [] };

        cmdIn.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdIn.value.toLowerCase().trim();
                const apps = ['hello','drawing','timing','weather','chat','vocabulary','calculator'];
                if(apps.includes(val)) launch(val);
            }
        });

        function launch(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            exitBtn.classList.add('active');
            render(type);
        }

        function goHome() {
            clearInterval(swI); clearInterval(trI);
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            exitBtn.classList.remove('active');
            cmdIn.value = '';
            setTimeout(() => cmdIn.focus(), 600);
        }

        function render(type) {
            mount.innerHTML = '';
            if(type === 'hello') {
                mount.innerHTML = `
                    <div style="margin: auto; text-align: center;">
                        <div class="title">Hello.</div>
                        <p class="subtitle">This is your digital archive. A sanctuary of focus where every tool is a reflection of precision. Use commands to navigate through time, thoughts, and art.</p>
                    </div>`;
            } else if(type === 'drawing') {
                mount.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="title" style="margin:0">Canvas.</div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="dMode='pen'">Pen</button>
                            <button onclick="dMode='eraser'">Eraser</button>
                            <button onclick="undo('main')">Undo</button>
                            <button onclick="clearC('main')">Clear</button>
                        </div>
                    </div>
                    <div id="draw-container"><canvas id="can-main"></canvas></div>`;
                setTimeout(() => initDraw('can-main'), 50);
            } else if(type === 'vocabulary') {
                mount.innerHTML = `
                    <input type="text" id="v-i" placeholder="Search word..." style="background:none; border:none; border-bottom:2px solid #222; color:#fff; font-size:3rem; font-weight:800; width:100%; outline:none;">
                    <div id="v-o"></div>`;
                const vi = document.getElementById('v-i'); vi.focus();
                vi.onkeypress = async(e) => { if(e.key==='Enter') searchVoc(vi.value); };
            } else if(type === 'chat') {
                mount.innerHTML = `
                    <div id="chat-l"></div>
                    <input type="text" id="chat-i" placeholder="Type something..." style="background:none; border:none; border-bottom:2px solid #222; color:#fff; font-size:1.5rem; width:100%; outline:none; padding:20px 0;">`;
                initChat();
            } else if(type === 'weather') {
                mount.innerHTML = `
                    <div class="title">Los Angeles.</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:30px; margin-top:50px">
                        <div style="padding:40px; border-radius:30px; background:var(--accent)">
                            <div class="voc-meta">Yesterday</div><div class="title" style="font-size:2.5rem">18°C</div>
                        </div>
                        <div style="padding:40px; border-radius:30px; border:1px solid #fff">
                            <div class="voc-meta">Today</div><div id="w-curr" class="title" style="font-size:2.5rem">0°C</div>
                        </div>
                        <div style="padding:40px; border-radius:30px; background:var(--accent)">
                            <div class="voc-meta">Tomorrow</div><div class="title" style="font-size:2.5rem">25°C</div>
                        </div>
                    </div>`;
                let c=0; let itv=setInterval(()=>{if(c>=22){clearInterval(itv)} document.getElementById('w-curr').innerText=c+'°C';c++},30);
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div class="calc-grid">
                        <div style="display:flex; flex-direction:column; justify-content:center;">
                            <div id="c-r" style="font-family:'JetBrains Mono'; font-size:4rem; text-align:right; margin-bottom:30px">0</div>
                            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px">
                                ${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="calcE('${k}')" style="height:65px; border-radius:15px; font-size:14px">${k.replace('Math.','')}</button>`).join('')}
                            </div>
                        </div>
                        <div class="sketch-area">
                            <div style="position:absolute; top:20px; left:20px; z-index:10; display:flex; gap:10px">
                                <button onclick="undo('calc')" style="padding:8px 15px; font-size:9px">Undo</button>
                                <button onclick="clearC('calc')" style="padding:8px 15px; font-size:9px">Clear</button>
                            </div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                setTimeout(() => initDraw('can-calc'), 50);
            }
        }

        // --- Drawing Logic ---
        function initDraw(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            const box = c.parentElement;
            c.width = box.offsetWidth; c.height = box.offsetHeight;
            let drawing = false;
            const push = () => { if(stacks[id.includes('main')?'main':'calc'].length>20) stacks[id.includes('main')?'main':'calc'].shift(); stacks[id.includes('main')?'main':'calc'].push(c.toDataURL()); };
            push();
            c.onmousedown = (e) => { drawing=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) push(); drawing=false; };
            c.onmousemove = (e) => {
                if(!drawing) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = 2; ctx.strokeStyle = (dMode==='eraser'&&id==='can-main')?'#050505':'#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undo = (t) => { 
                const target = t==='main'?'can-main':'can-calc'; const s = stacks[t];
                if(s.length>1){ s.pop(); let img=new Image(); img.src=s[s.length-1]; img.onload=()=>{ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(img,0,0);}}
            };
            window.clearC = (t) => { ctx.clearRect(0,0,c.width,c.height); stacks[t]=[]; push(); };
        }

        // --- Vocabulary Logic ---
        async function searchVoc(word) {
            const out = document.getElementById('v-o');
            try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await res.json();
                if(data[0]) {
                    const d = data[0];
                    const meaning = d.meanings[0];
                    out.innerHTML = `
                        <div class="voc-card">
                            <div>
                                <div class="voc-meta">Definition</div>
                                <div class="title" style="font-size:3rem">${word}</div>
                                <div class="voc-tag">${meaning.partOfSpeech}</div>
                                <p class="subtitle" style="margin-top:20px">${meaning.definitions[0].definition}</p>
                            </div>
                            <div style="border-left:1px solid #111; padding-left:60px">
                                <div class="voc-section">
                                    <div class="voc-meta">Translation</div>
                                    <div style="font-size:1.8rem; font-weight:800">词义载入中... (API限制)</div>
                                </div>
                                <div class="voc-section">
                                    <div class="voc-meta">Synonyms</div>
                                    ${(meaning.synonyms.slice(0,2).join(', ')) || 'None found'}
                                </div>
                                <div class="voc-section">
                                    <div class="voc-meta">Antonyms</div>
                                    ${(meaning.antonyms.slice(0,2).join(', ')) || 'None found'}
                                </div>
                                <div class="voc-section">
                                    <div class="voc-meta">Example Sentence</div>
                                    <p style="font-style:italic; color:#fff">"${meaning.definitions[0].example || 'No example provided for this word.'}"</p>
                                </div>
                            </div>
                        </div>`;
                }
            } catch(e) { out.innerHTML = "Word not found."; }
        }

        // --- Chat Logic ---
        function initChat() {
            const i = document.getElementById('chat-i'), l = document.getElementById('chat-l');
            i.onkeypress = (e) => {
                if(e.key==='Enter' && i.value.trim()){
                    const v = i.value.trim();
                    l.innerHTML += `<div class="chat-row user"><div class="chat-label">You</div><div class="chat-bubble">${v}</div></div>`;
                    i.value = '';
                    setTimeout(() => {
                        let r = "guess the password";
                        if(v === 'Jefferson') r = "He is someone loved by Presley";
                        else if(v === 'Presley') r = "She is not here";
                        else if(v === '15') r = "Look at the photos, they will help you";
                        else if(v === '16') r = "I like this, give it to me";
                        else if(v === 'basketball') r = "Wait until we are both 18, I love you";
                        
                        l.innerHTML += `<div class="chat-row"><div class="chat-label">System</div><div class="chat-bubble" style="color:var(--sub)">${r}</div></div>`;
                        l.scrollTop = l.scrollHeight;
                    }, 500);
                }
            }
        }

        let calcV = "";
        window.calcE = (k) => {
            const r = document.getElementById('c-r');
            if(k==='C') calcV=""; else if(k==='=') { try{calcV=eval(calcV).toString()}catch{calcV="Error"} } else calcV+=k;
            r.innerText = calcV || "0";
        }
    </script>
</body>
</html>
