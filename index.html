<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --sub: #888;
            --border: #222;
            --top-height: 180px;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, "Inter", "Segoe UI", sans-serif; overflow: hidden; 
        }

        /* 顶部导航与输入区 */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--top-height);
            padding: 40px 60px; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .nav-label { font-size: 11px; color: var(--sub); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
        .main-input {
            background: transparent; border: none; border-bottom: 1px solid var(--border);
            color: var(--text); font-size: 2.5rem; width: 100%; outline: none;
            padding-bottom: 12px; transition: border-color 0.3s;
        }
        .main-input:focus { border-bottom-color: #eee; }

        /* 内容显示区 */
        .content-wrap {
            margin-top: var(--top-height); height: calc(100vh - var(--top-height));
            padding: 0 60px 40px 60px; overflow-y: auto; scrollbar-width: none;
        }
        .content-wrap::-webkit-scrollbar { display: none; }

        /* 返回按钮 */
        #exit-btn {
            position: fixed; top: 40px; right: 60px; z-index: 200;
            font-size: 11px; color: var(--sub); cursor: pointer; display: none;
            border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px;
        }
        #exit-btn:hover { color: #fff; border-color: #fff; }

        /* Vocabulary 布局 */
        .voc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; margin-top: 20px; }
        .voc-word { font-size: 4rem; font-weight: 700; margin: 0; }
        .voc-pos { font-style: italic; color: var(--sub); margin-bottom: 20px; }
        .section { margin-bottom: 30px; }
        .section-h { font-size: 11px; color: var(--sub); text-transform: uppercase; margin-bottom: 10px; }
        .section-c { font-size: 1.2rem; line-height: 1.5; color: #ccc; }

        /* Drawing & Calculator */
        .canvas-container { width: 100%; height: 600px; background: #050505; border: 1px solid var(--border); position: relative; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        .tool-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: transparent; border: 1px solid var(--border); color: #fff; padding: 6px 14px; font-size: 11px; cursor: pointer; }
        button:hover { border-color: #fff; }

        /* Calculator */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 320px; }
        .calc-btn { height: 50px; font-size: 14px; border: 1px solid var(--border); }
        #calc-res { font-size: 3rem; margin-bottom: 20px; text-align: right; width: 320px; }

        /* Chat */
        .msg { margin-bottom: 40px; }
        .msg-u { text-align: right; color: var(--sub); }
        .msg-t { font-size: 1.5rem; line-height: 1.4; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="exit-btn" onclick="goHome()">BACK</div>

    <div class="header">
        <div id="mode-label" class="nav-label">COMMAND</div>
        <input type="text" id="input" class="main-input" placeholder="Type here..." autocomplete="off" autofocus>
    </div>

    <div id="mount" class="content-wrap">
        <div class="msg-t" style="color: #444">Welcome. Commands: hello, drawing, vocabulary, chat, calculator, weather.</div>
    </div>

    <script>
        const input = document.getElementById('input');
        const mount = document.getElementById('mount');
        const exit = document.getElementById('exit-btn');
        const modeLabel = document.getElementById('mode-label');

        let appState = 'home';
        let dMode = 'pen';
        let stacks = { main: [], calc: [] };

        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = input.value.trim();
                const low = val.toLowerCase();
                if(appState === 'home') {
                    if(['hello','drawing','vocabulary','chat','calculator','weather'].includes(low)) launch(low);
                } else if(appState === 'vocabulary') {
                    search(val);
                } else if(appState === 'chat') {
                    chat(val);
                }
            }
        });

        function launch(type) {
            appState = type;
            modeLabel.innerText = type.toUpperCase();
            exit.style.display = 'block';
            input.value = '';
            render(type);
        }

        function goHome() {
            appState = 'home';
            modeLabel.innerText = 'COMMAND';
            exit.style.display = 'none';
            input.value = '';
            mount.innerHTML = `<div class="msg-t" style="color: #444">Welcome.</div>`;
            input.focus();
        }

        function render(type) {
            mount.innerHTML = '';
            if(type === 'hello') {
                mount.innerHTML = `<div><div class="voc-word">Hello.</div><p class="section-c" style="max-width:600px">This is a minimalist workspace. Every tool is focused on one task at a time.</p></div>`;
            } else if(type === 'drawing') {
                mount.innerHTML = `
                    <div class="tool-bar">
                        <button onclick="dMode='pen'">PEN</button><button onclick="dMode='eraser'">ERASER</button>
                        <button onclick="undo('main')">UNDO</button><button onclick="clearC('main')">CLEAR</button>
                    </div>
                    <div class="canvas-container"><canvas id="can-main"></canvas></div>`;
                setTimeout(() => initDraw('can-main'), 50);
            } else if(type === 'vocabulary') {
                input.placeholder = "Search Word...";
                mount.innerHTML = `<div id="v-res">Ready.</div>`;
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div style="display:flex; gap:60px;">
                        <div>
                            <div id="calc-res">0</div>
                            <div class="calc-grid">
                                ${['C','/','*','-','7','8','9','+','4','5','6','sqrt','1','2','3','=','0','.'].map(k=>`<button class="calc-btn" onclick="calc('${k}')">${k}</button>`).join('')}
                            </div>
                        </div>
                        <div class="canvas-container" style="width:400px; height:400px;">
                            <div style="position:absolute; top:10px; right:10px;"><button onclick="clearC('calc')">C</button></div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                setTimeout(() => initDraw('can-calc'), 50);
            } else if(type === 'chat') {
                mount.innerHTML = `<div id="chat-l"></div>`;
            }
        }

        // --- Vocabulary: 补全解释与内容 ---
        function search(w) {
            const out = document.getElementById('v-res');
            // 内置词库确保加载
            const lib = {
                "hello": { en: "A greeting used to express recognition or welcome.", pos: "noun / interjection", cn: "你好 / 问候", syn: ["greeting", "salutation"], ant: ["goodbye"], sent: "She gave a friendly hello to the new neighbor." },
                "jefferson": { en: "Commonly refers to Thomas Jefferson, the 3rd US President.", pos: "proper noun", cn: "杰斐逊", syn: ["Statesman"], ant: ["N/A"], sent: "Jefferson authored the Declaration of Independence." },
                "presley": { en: "Refers to Elvis Presley, the King of Rock and Roll.", pos: "proper noun", cn: "普雷斯利", syn: ["Icon"], ant: ["N/A"], sent: "Presley's mansion is called Graceland." }
            };

            const d = lib[w.toLowerCase()] || { en: "Definition not found in local library.", pos: "unknown", cn: "未找到翻译", syn: ["N/A"], ant: ["N/A"], sent: "N/A" };
            
            out.innerHTML = `
                <div class="voc-grid">
                    <div>
                        <h1 class="voc-word">${w}</h1>
                        <div class="voc-pos">${d.pos}</div>
                        <div class="section">
                            <div class="section-h">English Definition</div>
                            <div class="section-c">${d.en}</div>
                        </div>
                        <div class="section">
                            <div class="section-h">Chinese</div>
                            <div class="section-c" style="font-size: 2rem; color: #fff;">${d.cn}</div>
                        </div>
                    </div>
                    <div style="border-left: 1px solid #111; padding-left: 60px;">
                        <div class="section">
                            <div class="section-h">Synonyms / Antonyms</div>
                            <div class="section-c"><b>Syn:</b> ${d.syn.join(', ')} <br> <b>Ant:</b> ${d.ant.join(', ')}</div>
                        </div>
                        <div class="section">
                            <div class="section-h">Usage Example</div>
                            <div class="section-c" style="font-style: italic;">"${d.sent}"</div>
                        </div>
                    </div>
                </div>`;
        }

        // --- Chat: 逻辑严格匹配 ---
        function chat(v) {
            const l = document.getElementById('chat-l');
            const low = v.toLowerCase().trim();
            l.innerHTML += `<div class="msg msg-u"><div>You</div><div class="msg-t">${v}</div></div>`;
            input.value = '';
            
            let r = "guess the password";
            if(low === 'jefferson') r = "He is someone loved by Presley";
            else if(low === 'presley') r = "She is not here";
            else if(low === '15') r = "Look at the photos, they will help you";
            else if(low === '16') r = "I like this, give it to me";
            else if(low === 'basketball') r = "Wait until we are both 18, I love you";

            setTimeout(() => {
                l.innerHTML += `<div class="msg"><div>Archive</div><div class="msg-t" style="color:var(--sub)">${r}</div></div>`;
                mount.scrollTop = mount.scrollHeight;
            }, 300);
        }

        // --- Drawing Logic ---
        function initDraw(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            c.width = c.parentElement.offsetWidth; c.height = c.parentElement.offsetHeight;
            let draw = false;
            const push = () => { stacks[id==='can-main'?'main':'calc'].push(c.toDataURL()); };
            c.onmousedown = (e) => { draw=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(draw) push(); draw=false; };
            c.onmousemove = (e) => {
                if(!draw) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = 2; ctx.strokeStyle = (dMode==='eraser'&&id==='can-main')?'#050505':'#fff';
                ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undo = (t) => {
                const s = stacks[t];
                if(s.length > 1) {
                    s.pop(); let img = new Image(); img.src = s[s.length-1];
                    img.onload = () => { ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(img,0,0); };
                }
            };
            window.clearC = (t) => { ctx.clearRect(0,0,c.width,c.height); stacks[t]=[]; };
        }

        // --- Calculator ---
        let cv = "";
        window.calc = (k) => {
            const r = document.getElementById('calc-res');
            if(k==='C') cv="";
            else if(k==='='){ try{cv=eval(cv.replace('sqrt','Math.sqrt')).toString()}catch{cv="Error"} }
            else cv += k;
            r.innerText = cv || "0";
        }
    </script>
</body>
</html>
