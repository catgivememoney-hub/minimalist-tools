<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive OS v25 // Master Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #1a1a1a;
            --sub: #555;
            --accent: rgba(255, 255, 255, 0.05);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--p); 
            font-family: 'Lexend', sans-serif; overflow: hidden; 
        }

        /* HUD & Navigation */
        #hud { position: fixed; top: 40px; left: 40px; z-index: 1000; }
        #exit-btn { 
            font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--p);
            cursor: pointer; opacity: 0; transform: translateY(10px);
            transition: 0.8s var(--ease); border: 1px solid var(--accent);
            padding: 12px 28px; border-radius: 100px; backdrop-filter: blur(20px);
        }
        #exit-btn.active { opacity: 1; transform: translateY(0); }
        #exit-btn:hover { background: #fff; color: #000; }

        /* Screens */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 60px 100px; transition: 1.2s var(--ease); }
        .hidden { opacity: 0; transform: scale(1.02); pointer-events: none; filter: blur(30px); }
        
        #home-screen { justify-content: center; align-items: center; }
        #cmd-in { 
            background: transparent; border: none; color: #fff; padding: 20px 0; 
            font-size: 3rem; font-weight: 800; width: 500px; text-align: center;
            outline: none; border-bottom: 2px solid var(--s); transition: 0.6s var(--ease);
        }
        #cmd-in:focus { width: 650px; border-bottom-color: #fff; }

        /* Typography & Components */
        .title { font-size: 4.5rem; font-weight: 800; letter-spacing: -3px; margin: 0; line-height: 1; }
        .label-text { font-size: 11px; color: var(--sub); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
        
        button { 
            background: var(--accent); border: none; color: #fff; 
            padding: 14px 28px; font-size: 11px; font-weight: 600; border-radius: 100px;
            cursor: pointer; transition: 0.4s var(--ease);
        }
        button:hover { background: #fff; color: #000; transform: translateY(-2px); }

        /* Drawing: Ultra Wide */
        .draw-full { flex: 1; background: #080808; border-radius: 50px; border: 1px solid var(--s); position: relative; margin-top: 30px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; border-radius: 50px; }

        /* Vocabulary: Detailed Card */
        .voc-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 80px; margin-top: 50px; }
        .voc-tag { display: inline-block; padding: 6px 16px; background: var(--accent); border-radius: 8px; font-size: 12px; margin: 10px 10px 0 0; }
        .voc-detail-box { border-left: 1px solid var(--s); padding-left: 60px; }
        .voc-item { margin-bottom: 35px; }

        /* Calculator & Sketch */
        .calc-main-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 60px; height: 70vh; align-items: center; }
        .sketch-wrap { height: 100%; background: #080808; border-radius: 40px; border: 1px solid var(--s); position: relative; }

        /* Chat */
        #chat-l { flex: 1; overflow-y: auto; margin-bottom: 40px; }
        .chat-bubble { font-size: 2rem; font-weight: 600; margin-bottom: 40px; line-height: 1.2; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="exit-btn" onclick="goHome()">Exit / Return</div>
    </div>

    <div id="home-screen" class="screen">
        <input type="text" id="cmd-in" placeholder="Command..." autocomplete="off" autofocus>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="mount" style="height: 100%; display: flex; flex-direction: column;"></div>
    </div>

    <script>
        const cmdIn = document.getElementById('cmd-in');
        const mount = document.getElementById('mount');
        const exitBtn = document.getElementById('exit-btn');
        let swInt, trInt, dMode = 'pen';
        let stacks = { main: [], calc: [] };

        cmdIn.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdIn.value.toLowerCase().trim();
                const valid = ['hello','drawing','timing','weather','chat','vocabulary','calculator'];
                if(valid.includes(val)) openApp(val);
            }
        });

        function openApp(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            exitBtn.classList.add('active');
            render(type);
        }

        function goHome() {
            clearInterval(swInt); clearInterval(trInt);
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            exitBtn.classList.remove('active');
            cmdIn.value = '';
            setTimeout(() => cmdIn.focus(), 600);
        }

        function render(type) {
            mount.innerHTML = '';
            if(type === 'hello') {
                mount.innerHTML = `
                    <div style="margin: auto; max-width: 800px;">
                        <div class="label-text">Manifesto</div>
                        <div class="title">Archive OS.</div>
                        <p style="font-size: 1.5rem; color: var(--sub); line-height: 1.6; margin-top: 30px;">
                            This is a space of pure focus. A digital sanctuary designed to eliminate noise and amplify thought. Navigate with intention.
                        </p>
                    </div>`;
            } else if(type === 'drawing') {
                mount.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                        <div><div class="label-text">Workspace</div><div class="title">Canvas</div></div>
                        <div style="display:flex; gap:15px;">
                            <button onclick="dMode='pen'">Pen</button>
                            <button onclick="dMode='eraser'">Eraser</button>
                            <button onclick="undoDraw('main')">Undo</button>
                            <button onclick="clearCanvas('main')">Clear All</button>
                        </div>
                    </div>
                    <div class="draw-full"><canvas id="can-main"></canvas></div>`;
                setTimeout(() => initCanvas('can-main'), 50);
            } else if(type === 'vocabulary') {
                mount.innerHTML = `
                    <input type="text" id="v-i" placeholder="Type a word..." style="background:none; border:none; border-bottom:2px solid #111; color:#fff; font-size:4rem; font-weight:800; width:100%; outline:none;">
                    <div id="v-o"></div>`;
                const vi = document.getElementById('v-i'); vi.focus();
                vi.onkeypress = async(e) => { if(e.key==='Enter') fetchVoc(vi.value); };
            } else if(type === 'chat') {
                mount.innerHTML = `
                    <div id="chat-l"></div>
                    <input type="text" id="chat-i" placeholder="Transmit..." style="background:none; border:none; border-bottom:1px solid #222; color:#fff; font-size:2rem; width:100%; outline:none; padding:20px 0;">`;
                initChatLogic();
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div class="calc-main-layout">
                        <div>
                            <div id="c-res" style="font-family:'JetBrains Mono'; font-size:4rem; text-align:right; margin-bottom:40px;">0</div>
                            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
                                ${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="calcExec('${k}')" style="height:70px; border-radius:20px;">${k.replace('Math.','')}</button>`).join('')}
                            </div>
                        </div>
                        <div class="sketch-wrap">
                            <div style="position:absolute; top:25px; left:25px; z-index:10; display:flex; gap:10px;">
                                <button onclick="undoDraw('calc')" style="padding:8px 18px; font-size:10px">Undo</button>
                                <button onclick="clearCanvas('calc')" style="padding:8px 18px; font-size:10px">Clear</button>
                            </div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                setTimeout(() => initCanvas('can-calc'), 50);
            } else if(type === 'timing') {
                mount.innerHTML = `
                    <div class="title">Timing</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:100px; margin-top:50px;">
                        <div>
                            <div class="label-text">Stopwatch</div>
                            <div id="sw-val" style="font-family:'JetBrains Mono'; font-size:6rem;">00:00.0</div>
                            <div style="display:flex; gap:10px;"><button onclick="swOp('s')">Start</button><button onclick="swOp('p')">Pause</button><button onclick="swOp('r')">Reset</button></div>
                        </div>
                        <div style="border-left:1px solid #111; padding-left:80px;">
                            <div class="label-text">Timer</div>
                            <div id="tr-val" style="font-family:'JetBrains Mono'; font-size:6rem; color:#222;">00:00</div>
                            <input type="number" id="tr-in" placeholder="MIN" style="background:none; border:none; border-bottom:1px solid #222; color:#fff; font-size:2rem; width:100px; outline:none; margin-bottom:20px;">
                            <br><button onclick="trOp('s')">Set</button><button onclick="trOp('r')">Reset</button>
                        </div>
                    </div>`;
            } else if(type === 'weather') {
                mount.innerHTML = `
                    <div class="title">Weather</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:30px; margin-top:60px;">
                        <div style="padding:50px; border-radius:40px; background:var(--accent)"><div class="label-text">Yesterday</div><div class="title" style="font-size:3rem">19°C</div></div>
                        <div style="padding:50px; border-radius:40px; border:1px solid #fff"><div class="label-text">Today</div><div id="w-now" class="title" style="font-size:3rem">0°C</div></div>
                        <div style="padding:50px; border-radius:40px; background:var(--accent)"><div class="label-text">Tomorrow</div><div class="title" style="font-size:3rem">24°C</div></div>
                    </div>`;
                let t=0; let i=setInterval(()=>{if(t>=22){clearInterval(i)} document.getElementById('w-now').innerText=t+'°C'; t++},40);
            }
        }

        // --- Logic: Drawing System ---
        function initCanvas(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            const box = c.parentElement;
            c.width = box.offsetWidth; c.height = box.offsetHeight;
            let active = false;
            const push = () => { 
                let s = id==='can-main'?stacks.main:stacks.calc;
                if(s.length>25) s.shift();
                s.push(c.toDataURL());
            };
            push();
            c.onmousedown = (e) => { active=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(active) push(); active=false; };
            c.onmousemove = (e) => {
                if(!active) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = 2.5; ctx.strokeStyle = (dMode==='eraser'&&id==='can-main')?'#080808':'#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undoDraw = (t) => {
                const can = document.getElementById(t==='main'?'can-main':'can-calc');
                const s = t==='main'?stacks.main:stacks.calc;
                if(s.length>1) { s.pop(); let img=new Image(); img.src=s[s.length-1]; img.onload=()=> {can.getContext('2d').clearRect(0,0,can.width,can.height); can.getContext('2d').drawImage(img,0,0);}}
            };
            window.clearCanvas = (t) => { 
                const can = document.getElementById(t==='main'?'can-main':'can-calc');
                can.getContext('2d').clearRect(0,0,can.width,can.height);
                if(t==='main') stacks.main=[]; else stacks.calc=[]; push();
            };
        }

        // --- Logic: Vocabulary ---
        async function fetchVoc(word) {
            const o = document.getElementById('v-o');
            try {
                const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const d = await r.json();
                if(d[0]) {
                    const main = d[0].meanings[0];
                    o.innerHTML = `
                        <div class="voc-grid">
                            <div>
                                <div class="label-text">Entry</div>
                                <div class="title" style="font-size:4rem">${word}</div>
                                <div class="voc-tag">${main.partOfSpeech}</div>
                                <p style="font-size:1.4rem; color:var(--sub); margin-top:30px; line-height:1.4;">${main.definitions[0].definition}</p>
                            </div>
                            <div class="voc-detail-box">
                                <div class="voc-item"><div class="label-text">Chinese</div><div style="font-size:1.8rem; font-weight:600;">翻译载入中...</div></div>
                                <div class="voc-item"><div class="label-text">Synonyms</div><div>${main.synonyms.slice(0,2).join(', ') || 'None'}</div></div>
                                <div class="voc-item"><div class="label-text">Antonyms</div><div>${main.antonyms.slice(0,2).join(', ') || 'None'}</div></div>
                                <div class="voc-item"><div class="label-text">Example</div><div style="font-style:italic; border-left:2px solid #222; padding-left:20px;">"${main.definitions[0].example || 'No example available'}"</div></div>
                            </div>
                        </div>`;
                }
            } catch(e) { o.innerHTML = "Not found."; }
        }

        // --- Logic: Chat ---
        function initChatLogic() {
            const i = document.getElementById('chat-i'), l = document.getElementById('chat-l');
            i.onkeypress = (e) => {
                if(e.key==='Enter' && i.value.trim()) {
                    const v = i.value.trim();
                    l.innerHTML += `<div class="chat-bubble" style="text-align:right"><div>${v}</div><div class="label-text">You</div></div>`;
                    i.value = '';
                    setTimeout(() => {
                        let r = "guess the password";
                        if(v==='Jefferson') r = "He is someone loved by Presley";
                        else if(v==='Presley') r = "She is not here";
                        else if(v==='15') r = "Look at the photos, they will help you";
                        else if(v==='16') r = "I like this, give it to me";
                        else if(v==='basketball') r = "Wait until we are both 18, I love you";
                        
                        l.innerHTML += `<div class="chat-bubble" style="color:var(--sub)"><div>${r}</div><div class="label-text">System</div></div>`;
                        l.scrollTop = l.scrollHeight;
                    }, 500);
                }
            }
        }

        // --- Logic: Utils ---
        let swMs=0;
        window.swOp=(a)=>{
            const v=document.getElementById('sw-val');
            if(a==='s'&&!swInt) swInt=setInterval(()=>{swMs+=100; v.innerText=(swMs/1000).toFixed(1)+'s'},100);
            else if(a==='p'){clearInterval(swInt); swInt=null}
            else if(a==='r'){clearInterval(swInt); swInt=null; swMs=0; v.innerText="00:00.0"}
        };
        window.trOp=(a)=>{
            const v=document.getElementById('tr-val');
            if(a==='s'){
                clearInterval(trInt); let s=(parseInt(document.getElementById('tr-in').value)||0)*60;
                v.style.color="#fff";
                trInt=setInterval(()=>{if(s<=0){clearInterval(trInt); v.style.color="red"; return} s--; v.innerText=`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`},1000);
            } else {clearInterval(trInt); v.innerText="00:00"; v.style.color="#222"}
        };
        let calcV="";
        window.calcExec=(k)=>{
            const r=document.getElementById('c-res');
            if(k==='C')calcV=""; else if(k==='='){try{calcV=eval(calcV).toString()}catch{calcV="Error"}} else calcV+=k;
            r.innerText=calcV||"0";
        }
    </script>
</body>
</html>
