<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist OS v12.2</title>
    <style>
        :root {
            --bg: #000;
            --text: #666;
            --active: #fff;
            --border: #1a1a1a;
            --font: "Inter", -apple-system, sans-serif;
        }
        * { box-sizing: border-box; font-family: var(--font); cursor: crosshair; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* UI Components */
        #back-btn { position: fixed; top: 40px; left: 40px; font-size: 10px; letter-spacing: 5px; display: none; z-index: 100; color: var(--text); transition: 0.3s; }
        #back-btn:hover { color: var(--active); }
        #la-timer { position: fixed; bottom: 40px; left: 40px; font-size: 10px; letter-spacing: 4px; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        input { 
            background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--active); 
            padding: 10px 0; outline: none; width: 300px; text-align: center; font-size: 1.2rem; font-weight: 200; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        input:focus { border-bottom-color: var(--active); width: 380px; }

        button { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px 16px; font-size: 10px; letter-spacing: 2px; transition: 0.3s; margin: 2px; }
        button:hover { color: var(--active); border-color: var(--active); }

        .container { width: 90%; max-width: 1200px; height: 80vh; display: flex; flex-direction: column; }
        
        /* Apps */
        .word-title { font-size: 6rem; font-weight: 100; color: var(--active); margin: 0; letter-spacing: -4px; }
        .grid-layout { display: grid; grid-template-columns: 320px 1fr; gap: 80px; height: 100%; }
        canvas { background: #050505; border: 1px solid var(--border); }
        
        #chat-log { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 25px; margin-bottom: 30px; }
        .msg { font-size: 1rem; line-height: 1.6; max-width: 80%; }
        .ai-msg { color: var(--text); border-left: 1px solid #333; padding-left: 20px; }
        .user-msg { color: var(--active); align-self: flex-end; text-align: right; }
    </style>
</head>
<body onclick="activateAudio()">

    <div id="back-btn" onclick="goHome()">BACK / EXIT</div>
    <div id="la-timer">00:00:00</div>

    <div id="home-screen" class="screen">
        <div style="font-size: 9px; letter-spacing: 10px; margin-bottom: 50px; opacity: 0.3;">SYSTEM READY</div>
        <input type="text" id="main-cmd" placeholder="TYPE COMMAND" autocomplete="off">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        // --- 音效系统 (精选机械音采样) ---
        const clickSound = new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTdvT19hc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rh");
        clickSound.volume = 0.2;
        
        function playKey() { 
            const s = clickSound.cloneNode(); 
            s.volume = 0.15;
            s.play().catch(()=>{}); 
        }

        function activateAudio() { document.body.onclick = null; }

        // --- 全局逻辑 ---
        const mainCmd = document.getElementById('main-cmd');
        const appContent = document.getElementById('app-content');
        
        mainCmd.addEventListener('input', playKey);
        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const apps = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat', 'hello'];
                if (apps.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('back-btn').style.display = 'block';
            renderApp(type);
        }

        function goHome() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('back-btn').style.display = 'none';
            mainCmd.value = '';
        }

        function renderApp(type) {
            appContent.innerHTML = '';
            if(type === 'hello') appContent.innerHTML = `<div class="screen"><div class="word-title">Hello.</div><p style="opacity:0.3; letter-spacing:5px;">A SANCTUARY FOR FOCUS.</p></div>`;
            else if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
            else if(type === 'chat') initChat();
            
            // 为新生成的 input 绑定音效
            appContent.querySelectorAll('input').forEach(i => i.addEventListener('input', playKey));
        }

        // --- VOCABULARY ---
        async function initVocab() {
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="SEARCH" style="width:100%; text-align:left;"><div id="v-res" style="margin-top:60px;"></div>`;
            const vin = document.getElementById('v-in'); vin.focus();
            vin.onkeypress = async (e) => {
                if(e.key === 'Enter') {
                    const w = vin.value.trim();
                    const res = document.getElementById('v-res'); res.innerHTML = "...";
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
                    const d = await r.json();
                    const def = d[0].meanings[0].definitions[0].definition;
                    const zh = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(def)}&langpair=en|zh-CN`).then(res=>res.json());
                    res.innerHTML = `<div class="word-title">${w}</div><div style="margin-top:30px; line-height:2; max-width:800px;">${def}<div style="color:#333; margin-top:10px;">${zh.responseData.translatedText}</div></div>`;
                }
            };
        }

        // --- DRAWING (FIXED UNDO) ---
        let dHistory = [];
        let dStep = -1;
        function initDrawing() {
            appContent.innerHTML = `<div style="margin-bottom:20px;"><button onclick="dMode='pen'">PEN</button><button onclick="dMode='eraser'">ERASER</button><button onclick="undo()">UNDO</button><button onclick="clearD()">CLEAR</button></div><canvas id="d-can" width="1100" height="550"></canvas>`;
            const c = document.getElementById('d-can'), ctx = c.getContext('2d');
            window.dMode = 'pen';
            
            const save = () => {
                dStep++;
                if(dStep < dHistory.length) dHistory.length = dStep;
                dHistory.push(ctx.getImageData(0,0,c.width,c.height));
            };
            save();

            let drawing = false;
            c.onmousedown = (e) => { drawing = true; ctx.beginPath(); const r = c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) save(); drawing = false; };
            c.onmousemove = (e) => {
                if(!drawing) return;
                const r = c.getBoundingClientRect();
                ctx.lineWidth = dMode === 'eraser' ? 40 : 1.5;
                ctx.strokeStyle = dMode === 'eraser' ? '#050505' : '#fff';
                ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undo = () => { if(dStep > 0) { dStep--; ctx.putImageData(dHistory[dStep], 0, 0); } };
            window.clearD = () => { ctx.clearRect(0,0,c.width,c.height); save(); };
        }

        // --- WEATHER (FIXED NAVIGATION) ---
        let wIdx = 1;
        function initWeather() {
            const update = () => {
                const data = [ {l:'YESTERDAY', t:19}, {l:'TODAY', t:22}, {l:'TOMORROW', t:24} ];
                appContent.innerHTML = `<div class="screen" style="text-align:center;"><div style="font-size:10px; letter-spacing:10px; opacity:0.3;">${data[wIdx].l}</div><div class="word-title" style="font-size:10rem; margin:20px 0;">${data[wIdx].t}°C</div><div style="letter-spacing:5px;">LOS ANGELES</div><div style="margin-top:50px;"><button onclick="wChange(-1)">PREV</button><button onclick="wChange(1)">NEXT</button></div></div>`;
            };
            window.wChange = (n) => { wIdx = Math.max(0, Math.min(2, wIdx + n)); update(); };
            update();
        }

        // --- CHAT (STRICT LOGIC) ---
        function initChat() {
            appContent.innerHTML = `<div id="chat-log"></div><input type="text" id="chat-in" placeholder="MESSAGE" style="width:100%; text-align:left;">`;
            const cin = document.getElementById('chat-in'); cin.focus();
            cin.onkeypress = (e) => {
                if(e.key === 'Enter') {
                    const m = cin.value.trim(); if(!m) return;
                    const log = document.getElementById('chat-log');
                    log.innerHTML += `<div class="msg user-msg">${m}</div>`;
                    cin.value = '';
                    setTimeout(() => {
                        let a = "guess who am I";
                        if(m === 'Jefferson') a = "I love you Presley";
                        else if(m === 'Presley') a = "She‘s not here";
                        else if(m === '15') a = "basketball will be better after 18";
                        else if(m === '16') a = "sure I do like this one";
                        log.innerHTML += `<div class="msg ai-msg">${a}</div>`;
                        log.scrollTop = log.scrollHeight;
                    }, 400);
                }
            };
        }

        // --- CALCULATOR ---
        let exp = "";
        function initCalc() {
            appContent.innerHTML = `<div class="grid-layout"><div><div id="c-out" style="font-size:4rem; color:#fff; text-align:right; margin-bottom:40px; height:80px;">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="calc('${k}')">${k.replace('Math.','')}</button>`).join('')}</div></div><canvas id="c-pad" width="700" height="520"></canvas></div>`;
            const cp = document.getElementById('c-pad'), ctx = cp.getContext('2d');
            let d = false;
            cp.onmousedown = () => d = true; cp.onmouseup = () => d = false;
            cp.onmousemove = (e) => { if(!d) return; const r = cp.getBoundingClientRect(); ctx.strokeStyle='#333'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke(); };
            window.calc = (k) => { playKey(); if(k==='C') exp=""; else if(k==='=') exp=eval(exp).toString(); else exp+=k; document.getElementById('c-out').innerText = exp || "0"; };
        }

        // --- TIMING ---
        let swMs = 0, swI = null;
        function initTiming() {
            appContent.innerHTML = `<div class="screen"><div style="font-size:10px; letter-spacing:10px; opacity:0.3; margin-bottom:20px;">STOPWATCH</div><div id="sw-h" class="word-title">00:00:00</div><div style="margin-top:40px;"><button onclick="swAction('s')">START</button><button onclick="swAction('p')">STOP</button><button onclick="swMs=0; swAction('p')">RESET</button></div></div>`;
        }
        window.swAction = (a) => {
            const h = document.getElementById('sw-h');
            if(a==='s') { if(!swI) swI = setInterval(()=>{swMs+=1000; h.innerText=new Date(swMs).toISOString().substr(11,8)},1000); }
            else { clearInterval(swI); swI=null; if(swMs===0) h.innerText="00:00:00"; }
        };

        setInterval(() => {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = now;
        }, 1000);
    </script>
</body>
</html>
