<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist OS v11.3_Final_Fixed</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #222;
            --input-bg: #151515;
            --glow: rgba(255, 255, 255, 0.05);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; font-family: "Inter", "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 18px; cursor: pointer; opacity: 0.3; transition: var(--transition); z-index: 1000; display: none; letter-spacing: 2px;}
        #back-btn:hover { opacity: 1; transform: translateX(-5px); }
        
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 10px; letter-spacing: 3px; opacity: 0.4; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: var(--transition); }
        .hidden { display: none !important; opacity: 0; }

        input { 
            background: var(--input-bg); border: 1px solid var(--border); color: #eee; padding: 12px 20px; outline: none; 
            transition: var(--transition); border-radius: 4px;
        }
        input:focus { border-color: #555; box-shadow: 0 0 20px var(--glow); }

        button { 
            background: var(--accent); border: 1px solid var(--border); color: var(--text); cursor: pointer; 
            padding: 10px 18px; transition: var(--transition); border-radius: 4px;
        }
        button:hover { background: #333; color: #fff; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }

        .container { 
            width: 95%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column; 
            animation: fadeInSlide 0.6s ease forwards; 
        }

        /* Hello Interface Styles */
        .intro-text { text-align: center; max-width: 700px; line-height: 1.8; animation: fadeInSlide 0.8s ease; }
        .intro-title { font-size: 4rem; font-weight: 100; color: #fff; margin-bottom: 20px; letter-spacing: -2px; }

        .res-section, .msg { animation: fadeInSlide 0.5s ease both; margin-bottom: 10px; }
        .zh-text { color: #666; font-size: 0.95rem; margin-top: 5px; border-left: 2px solid #333; padding-left: 10px; }

        /* Calculator Layout */
        .calc-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 40px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-display { width: 100%; height: 70px; background: var(--input-bg); border: 1px solid var(--border); color: #fff; text-align: right; font-size: 2rem; padding: 15px; margin-bottom: 15px; border-radius: 4px; transition: transform 0.1s; overflow: hidden;}

        /* Drawing Layout */
        .draw-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; }
        canvas { background: #000; border: 1px solid var(--border); border-radius: 4px; cursor: crosshair; }

        /* Timing Layout */
        .time-box { border: 1px solid var(--border); padding: 40px; text-align: center; background: rgba(255,255,255,0.01); flex: 1; border-radius: 8px;}
        .big-clock { font-size: 5rem; font-weight: 100; color: #fff; margin: 25px 0; font-variant-numeric: tabular-nums; }

        /* Chat Layout */
        #chat-log { flex: 1; overflow-y: auto; padding: 25px; border: 1px solid var(--border); background: var(--input-bg); margin-bottom: 15px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { align-self: flex-end; background: #222; color: #fff; padding: 10px 15px; border-radius: 12px 12px 0 12px; max-width: 70%; }
        .ai-msg { align-self: flex-start; border-left: 3px solid #444; background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 0 12px 12px 12px; max-width: 70%; }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="back-btn" onclick="goHome()">BACK</div>
    <div id="la-timer">LA TIME 00:00:00</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 30px; opacity: 0.4; letter-spacing: 4px; font-size: 11px;">SYSTEM SECURE</div>
        <input type="text" id="main-cmd" placeholder="Enter Command..." autocomplete="off" style="width: 350px; text-align: center; font-size: 1.1rem; border-radius: 30px;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        // 音效: 极简打字声
        const clickSound = new Audio("data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YTdvT19hc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rhc2Rh");
        clickSound.volume = 0.1;
        function playKey() { clickSound.currentTime = 0; clickSound.play().catch(()=>{}); }
        function enableAudio() { document.body.onclick = null; }
        function attachKeySound(el) { if(el) el.addEventListener('input', playKey); }
        attachKeySound(mainCmd);

        let swInt = null, trInt = null, swMs = 0, trSec = 0;
        let drawHistory = [], drawStep = -1, currentMode = 'pen', calcExp = "";

        // 路由逻辑
        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const apps = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat', 'hello'];
                if (apps.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.style.opacity = '0';
            setTimeout(() => {
                homeScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                appScreen.style.opacity = '1';
                backBtn.style.display = 'block';
                renderApp(type);
            }, 300);
        }

        function goHome() {
            appScreen.style.opacity = '0';
            setTimeout(() => {
                appScreen.classList.add('hidden');
                homeScreen.classList.remove('hidden');
                homeScreen.style.opacity = '1';
                backBtn.style.display = 'none';
                mainCmd.value = '';
                clearInterval(swInt); clearInterval(trInt);
            }, 300);
        }

        function renderApp(type) {
            appContent.innerHTML = '';
            appContent.style.justifyContent = "flex-start";
            appContent.style.alignItems = "stretch";
            if(type === 'hello') initHello();
            else if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
            else if(type === 'chat') initChat();
        }

        // --- 0. HELLO 界面 ---
        function initHello() {
            appContent.style.justifyContent = "center";
            appContent.style.alignItems = "center";
            appContent.innerHTML = `
                <div class="intro-text">
                    <div class="intro-title">Minimalist Tools</div>
                    <p style="opacity:0.4; letter-spacing:3px; margin-bottom:50px;">V11.3 // PRIVATE SYSTEM</p>
                    <div class="res-section" style="animation-delay:0.2s">
                        Welcome to a focused digital environment. 
                        Every tool here is built to serve, not to distract.
                    </div>
                    <div class="res-section" style="animation-delay:0.4s; font-size:0.9rem; opacity:0.6; margin-top:30px;">
                        AVAILABLE COMMANDS:<br>vocabulary, calculator, drawing, timing, weather, chat.
                    </div>
                </div>`;
        }

        // --- 1. VOCABULARY (带自动翻译) ---
        async function getZH(text) {
            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh-CN`);
                const data = await res.json(); return data.responseData.translatedText;
            } catch { return "Translation failed."; }
        }
        function initVocab() {
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="Search word..." style="width:100%; font-size:1.4rem; border-radius:8px;"><div id="v-res"></div>`;
            const vin = document.getElementById('v-in'); vin.focus(); attachKeySound(vin);
            vin.onkeypress = async (e) => {
                if(e.key !== 'Enter') return;
                const word = vin.value.trim();
                const res = document.getElementById('v-res'); res.innerHTML = "Searching...";
                try {
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await r.json();
                    const m = data[0].meanings[0];
                    const def = m.definitions[0].definition;
                    const ex = m.definitions[0].example || "No example available.";
                    const zhDef = await getZH(def);
                    const zhEx = ex !== "No example available." ? await getZH(ex) : "";
                    res.innerHTML = `
                        <h2 style="font-size:3.5rem; margin:25px 0; color:#fff;">${word}</h2>
                        <div class="res-section" style="animation-delay:0.1s"><strong>[${m.partOfSpeech.toUpperCase()}]</strong></div>
                        <div class="res-section" style="animation-delay:0.2s"><small>DEFINITION</small><br>${def}<div class="zh-text">${zhDef}</div></div>
                        <div class="res-section" style="animation-delay:0.3s"><small>EXAMPLE</small><br><i style="opacity:0.8;">${ex}</i>${zhEx?`<div class="zh-text">${zhEx}</div>`:''}</div>`;
                } catch { res.innerHTML = "Word not found."; }
            };
        }

        // --- 2. CALCULATOR (完整双面板布局) ---
        function initCalc() {
            appContent.innerHTML = `
                <div class="calc-wrapper">
                    <div>
                        <div id="c-out" class="calc-display">0</div>
                        <div class="calc-grid">
                            ${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k => `<button onclick="doCalc('${k}')">${k.replace('Math.','')}</button>`).join('')}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <canvas id="c-pad" width="650" height="480"></canvas>
                        <button onclick="clearCanvas('c-pad')" style="margin-top:15px;">CLEAR SCRATCHPAD</button>
                    </div>
                </div>`;
            initSketch('c-pad');
        }
        window.doCalc = (k) => {
            const out = document.getElementById('c-out'); playKey();
            if(k === 'C') calcExp = ""; 
            else if(k === '=') { try{calcExp = eval(calcExp).toString()}catch{calcExp = "Error"} }
            else calcExp += k;
            out.innerText = calcExp || "0";
        };

        // --- 3. CHAT (严格逻辑版) ---
        function initChat() {
            appContent.innerHTML = `
                <div id="chat-log"><div class="msg ai-msg">Waiting for user input...</div></div>
                <div style="display:flex; gap:12px;">
                    <input type="text" id="chat-in" placeholder="Message..." style="flex:1;">
                    <button id="chat-send">SEND</button>
                </div>`;
            const cin = document.getElementById('chat-in'); cin.focus(); attachKeySound(cin);
            const send = () => {
                const m = cin.value.trim(); if(!m) return;
                const log = document.getElementById('chat-log');
                const uMsg = document.createElement('div'); uMsg.className='msg user-msg'; uMsg.innerText=m;
                log.appendChild(uMsg); cin.value='';
                setTimeout(() => {
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg';
                    if (m === 'Jefferson') aMsg.innerText = "I love you Presley";
                    else if (m === 'Presley') aMsg.innerText = "She‘s not here";
                    else if (m === '15') aMsg.innerText = "basketball will be better after 18";
                    else if (m === '16') aMsg.innerText = "sure I do like this one";
                    else aMsg.innerText = "guess who am I";
                    log.appendChild(aMsg); log.scrollTop = log.scrollHeight;
                }, 400);
            };
            document.getElementById('chat-send').onclick = send;
            cin.onkeypress = (e) => { if(e.key==='Enter') send(); };
        }

        // --- 4. DRAWING (完整功能版) ---
        function initDrawing() {
            appContent.innerHTML = `
                <div class="draw-bar">
                    <input type="color" id="d-col" value="#ffffff">
                    <button onclick="currentMode='pen'">PEN</button>
                    <button onclick="currentMode='eraser'">ERASER</button>
                    <input type="range" id="d-sz" min="1" max="60" value="3">
                    <div style="flex:1"></div>
                    <button onclick="undo()">UNDO</button>
                    <button onclick="clearCanvas('d-can')">CLEAR</button>
                    <button onclick="saveD()" style="background:#fff; color:#000;">SAVE PNG</button>
                </div>
                <canvas id="d-can" width="1050" height="520"></canvas>`;
            initSketch('d-can', true);
        }

        // --- 5. TIMING (双功能布局) ---
        function initTiming() {
            appContent.style.justifyContent = "center";
            appContent.innerHTML = `
                <div style="display:flex; gap:40px; width:100%;">
                    <div class="time-box">
                        <h3>STOPWATCH</h3>
                        <div id="sw" class="big-clock">00:00:00</div>
                        <button onclick="swFunc('start')">START</button>
                        <button onclick="swFunc('stop')">STOP</button>
                        <button onclick="swFunc('reset')">RESET</button>
                    </div>
                    <div class="time-box">
                        <h3>TIMER</h3>
                        <div id="tr" class="big-clock">00:00:00</div>
                        <input type="number" id="tr-in" placeholder="Mins" style="width:100px; text-align:center; margin-bottom:15px;"><br>
                        <button onclick="trFunc('start')">START</button>
                    </div>
                </div>`;
            attachKeySound(document.getElementById('tr-in'));
        }
        window.swFunc=(a)=>{const d=document.getElementById('sw');if(a==='start'){if(swInt)return;swInt=setInterval(()=>{swMs+=1000;d.innerText=new Date(swMs).toISOString().substr(11,8)},1000)}else if(a==='stop'){clearInterval(swInt);swInt=null}else{clearInterval(swInt);swInt=null;swMs=0;d.innerText="00:00:00"}};
        window.trFunc=()=>{const d=document.getElementById('tr');clearInterval(trInt);trSec=(parseInt(document.getElementById('tr-in').value)||0)*60;trInt=setInterval(()=>{if(trSec<=0){clearInterval(trInt);alert("Time's up!");return}trSec--;let m=Math.floor(trSec/60),s=trSec%60;d.innerText=`00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`},1000)};

        // --- 6. WEATHER (动态视图) ---
        function initWeather() {
            appContent.style.justifyContent = "center";
            appContent.innerHTML = `<div style="text-align:center; animation:fadeInSlide 0.5s ease;"><h2 style="opacity:0.3; letter-spacing:5px;">LOS ANGELES</h2><div style="font-size:8rem; font-weight:100; margin:30px 0; color:#fff;">22°C</div><p style="letter-spacing:2px; opacity:0.6;">CLEAR SKIES</p></div>`;
        }

        // --- 核心绘图系统 (恢复 Undo/Clear/Eraser) ---
        function initSketch(id, isFull=false) {
            const c=document.getElementById(id),ctx=c.getContext('2d');
            let d=false; if(isFull){drawHistory=[c.toDataURL()];drawStep=0}
            c.onmousedown=(e)=>{d=true;ctx.beginPath();const r=c.getBoundingClientRect();ctx.moveTo(e.clientX-r.left,e.clientY-r.top)};
            c.onmouseup=()=>{if(d&&isFull){drawStep++;drawHistory.push(c.toDataURL())};d=false};
            c.onmousemove=(e)=>{
                if(!d)return;
                const r=c.getBoundingClientRect();
                ctx.lineWidth=isFull?document.getElementById('d-sz').value:2;
                ctx.lineCap='round'; ctx.lineJoin='round';
                ctx.strokeStyle=isFull?(currentMode==='eraser'?'#0d0d0d':document.getElementById('d-col').value):'#444';
                ctx.lineTo(e.clientX-r.left,e.clientY-r.top);ctx.stroke()
            };
            window.undo=()=>{if(drawStep>0){drawStep--;let i=new Image();i.src=drawHistory[drawStep];i.onload=()=>ctx.drawImage(i,0,0)}};
            window.clearCanvas=(cid)=>{const tc=document.getElementById(cid);tc.getContext('2d').clearRect(0,0,tc.width,tc.height);if(isFull){drawHistory=[tc.toDataURL()];drawStep=0}};
            window.saveD=()=>{const l=document.createElement('a');l.download='sketch.png';l.href=c.toDataURL();l.click()};
        }

        // 洛杉矶时间
        setInterval(() => {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME ${now}`;
        }, 1000);
    </script>
</body>
</html>
