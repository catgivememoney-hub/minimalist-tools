<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Workspace v4</title>
    <style>
        :root {
            --bg: #121212;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #333333;
            --input-bg: #1a1a1a;
        }

        * { box-sizing: border-box; font-family: "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 24px; cursor: pointer; opacity: 0.4; display: none; z-index: 1000; }
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 11px; letter-spacing: 2px; opacity: 0.5; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        input, button { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px; outline: none; }
        button { cursor: pointer; transition: 0.2s; background: var(--accent); font-size: 13px; }
        button:hover { background: var(--border); }

        .container { width: 95%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column; }

        /* --- Chat Box Style --- */
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid var(--border); background: var(--input-bg); margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; max-width: 80%; line-height: 1.4; border-radius: 2px; font-size: 14px; }
        .user-msg { align-self: flex-end; background: var(--accent); color: #fff; }
        .ai-msg { align-self: flex-start; border-left: 2px solid var(--text); background: transparent; }

        /* Calculator & Others (Keep previous styles) */
        .calc-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 40px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-display { width: 100%; height: 60px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); text-align: right; font-size: 1.8rem; padding: 10px; margin-bottom: 10px; }
        .draw-bar { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; background: var(--accent); padding: 10px; }
        canvas { background: var(--input-bg); border: 1px solid var(--border); cursor: crosshair; }
        .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .time-box { border: 1px solid var(--border); padding: 40px; text-align: center; }
        .big-clock { font-size: 4.5rem; font-weight: 200; margin: 25px 0; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goHome()">←</div>
    <div id="la-timer">LA TIME</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 25px; opacity: 0.6; letter-spacing: 2px;">WHAT DO YOU NEED?</div>
        <input type="text" id="main-cmd" placeholder="..." autocomplete="off" style="width: 320px; text-align: center; font-size: 1.2rem;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        let swInt = null, trInt = null, swMs = 0, trSec = 0;
        let aiMode = false;

        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const valid = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat'];
                if (valid.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            backBtn.style.display = 'block';
            appContent.innerHTML = '';
            if(type === 'chat') initChat();
            else if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
        }

        function goHome() {
            homeScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            backBtn.style.display = 'none';
            mainCmd.value = '';
            aiMode = false; // 重置 AI 模式
            clearInterval(swInt); clearInterval(trInt);
        }

        function updateLA() {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME: ${now}`;
        }
        setInterval(updateLA, 1000); updateLA();

        // --- 1. CHAT BOX (With Hidden AI Mode) ---
        function initChat() {
            appContent.innerHTML = `
                <div id="chat-log">
                    <div class="msg ai-msg">Console initialized. Waiting for input...</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-in" placeholder="Type something..." style="flex:1;">
                    <button id="send-btn">Send</button>
                </div>
            `;
            const chatIn = document.getElementById('chat-in');
            const chatLog = document.getElementById('chat-log');
            chatIn.focus();

            const appendMsg = (text, type) => {
                const div = document.createElement('div');
                div.className = `msg ${type === 'user' ? 'user-msg' : 'ai-msg'}`;
                div.innerText = text;
                chatLog.appendChild(div);
                chatLog.scrollTop = chatLog.scrollHeight;
            };

            const handleMsg = async () => {
                const msg = chatIn.value.trim();
                if (!msg) return;
                appendMsg(msg, 'user');
                chatIn.value = '';

                // 激活码验证
                if (msg === '52015') {
                    aiMode = true;
                    appendMsg("System: AI Mode Activated. How can I help you today?", 'ai');
                    return;
                }

                if (aiMode) {
                    appendMsg("AI is thinking...", 'ai');
                    // 模拟 AI 响应（你可以替换为真正的 API Fetch）
                    setTimeout(() => {
                        chatLog.lastChild.innerText = "I am a minimalist AI model. Your command '" + msg + "' has been processed.";
                    }, 800);
                } else {
                    appendMsg("System: Unknown command. Enter activation code to proceed.", 'ai');
                }
            };

            document.getElementById('send-btn').onclick = handleMsg;
            chatIn.onkeypress = (e) => { if(e.key === 'Enter') handleMsg(); };
        }

        // --- 以下保留原有功能的代码逻辑 (Calculator, Drawing, etc.) ---
        // (由于篇幅原因，此处逻辑与上一版保持一致，你可以直接将上一版的 initVocab, initCalc 等函数粘贴在这里)
        function initVocab() { /* 同前一版 */ }
        function initCalc() { /* 同前一版 */ }
        function initDrawing() { /* 同前一版 */ }
        function initTiming() { /* 同前一版 */ }
        function initWeather() { /* 同前一版 */ }
        // (绘图辅助逻辑 initSketch 也请保留)
    </script>
</body>
</html>
