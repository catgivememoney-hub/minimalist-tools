<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive OS v26 // Refined Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #1a1a1a;
            --sub: #666;
            --accent: rgba(255, 255, 255, 0.05);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--p); 
            font-family: 'Lexend', sans-serif; overflow-x: hidden; 
        }

        /* 修复遮挡：顶部导航与搜索框独立 */
        #hud { position: fixed; top: 30px; left: 40px; z-index: 1000; }
        #exit-btn { 
            font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--p);
            cursor: pointer; opacity: 0; transform: translateY(10px);
            transition: 0.8s var(--ease); border: 1px solid var(--accent);
            padding: 10px 24px; border-radius: 100px; backdrop-filter: blur(20px);
        }
        #exit-btn.active { opacity: 1; transform: translateY(0); }
        #exit-btn:hover { background: #fff; color: #000; }

        /* 屏显容器 */
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; padding: 100px 80px; transition: 1s var(--ease); }
        .hidden { opacity: 0; transform: scale(1.02); pointer-events: none; filter: blur(30px); }
        
        #home-screen { justify-content: center; align-items: center; padding: 0; }
        
        /* 搜索框：保持大气且不遮挡内容 */
        .search-container { width: 100%; max-width: 800px; margin-bottom: 50px; }
        .cmd-line { 
            background: transparent; border: none; color: #fff; padding: 15px 0; 
            font-size: 3.5rem; font-weight: 800; width: 100%;
            outline: none; border-bottom: 2px solid var(--s); transition: 0.6s var(--ease);
        }
        .cmd-line:focus { border-bottom-color: #fff; }

        /* 内容挂载区：确保滚动且不被遮挡 */
        #mount { flex: 1; overflow-y: auto; padding-top: 20px; }

        /* 排版组件 */
        .title { font-size: 4.5rem; font-weight: 800; letter-spacing: -3px; margin: 0; line-height: 1; }
        .label-mini { font-size: 10px; color: var(--sub); letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; font-weight: 600; }
        
        button { 
            background: var(--accent); border: none; color: #fff; 
            padding: 12px 24px; font-size: 11px; font-weight: 600; border-radius: 100px;
            cursor: pointer; transition: 0.4s var(--ease);
        }
        button:hover { background: #fff; color: #000; }

        /* Vocabulary 深度排版修复 */
        .voc-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 80px; align-items: start; animation: fadeIn 0.8s var(--ease); }
        .voc-main .entry { font-size: 5rem; font-weight: 800; margin-bottom: 10px; word-break: break-all; }
        .voc-tag { display: inline-block; padding: 4px 12px; background: var(--accent); border-radius: 6px; font-size: 12px; margin-bottom: 20px; }
        .voc-side { border-left: 1px solid var(--s); padding-left: 60px; }
        .voc-section { margin-bottom: 40px; }
        .voc-chinese { font-size: 2.2rem; font-weight: 600; color: #fff; }

        /* Drawing & Calculator 适配 */
        .full-canvas-wrap { flex: 1; background: #080808; border-radius: 40px; border: 1px solid var(--s); position: relative; min-height: 500px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; border-radius: 40px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="hud">
        <div id="exit-btn" onclick="goHome()">Exit / Return</div>
    </div>

    <div id="home-screen" class="screen">
        <div class="search-container">
            <div class="label-mini">Archive_Command</div>
            <input type="text" id="cmd-main" class="cmd-line" placeholder="Type..." autocomplete="off" autofocus>
        </div>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="mount"></div>
    </div>

    <script>
        const cmdMain = document.getElementById('cmd-main');
        const mount = document.getElementById('mount');
        const exitBtn = document.getElementById('exit-btn');
        let swInt, trInt, dMode = 'pen';
        let stacks = { main: [], calc: [] };

        // 路由逻辑
        cmdMain.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdMain.value.toLowerCase().trim();
                const valid = ['hello','drawing','timing','weather','chat','vocabulary','calculator'];
                if(valid.includes(val)) launch(val);
            }
        });

        function launch(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            exitBtn.classList.add('active');
            renderApp(type);
        }

        function goHome() {
            clearInterval(swInt); clearInterval(trInt);
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            exitBtn.classList.remove('active');
            cmdMain.value = '';
            mount.innerHTML = '';
            setTimeout(() => cmdMain.focus(), 600);
        }

        function renderApp(type) {
            mount.innerHTML = '';
            if(type === 'vocabulary') {
                mount.innerHTML = `
                    <div class="search-container">
                        <div class="label-mini">Dictionary_Query</div>
                        <input type="text" id="voc-input" class="cmd-line" placeholder="Word..." autocomplete="off">
                    </div>
                    <div id="voc-res"></div>`;
                const vi = document.getElementById('voc-input'); vi.focus();
                vi.onkeypress = (e) => { if(e.key==='Enter') searchWord(vi.value); };
            } else if(type === 'hello') {
                mount.innerHTML = `
                    <div style="max-width: 700px; margin-top: 50px;">
                        <div class="label-mini">Manifesto</div>
                        <div class="title">Hello.</div>
                        <p style="font-size: 1.5rem; color: var(--sub); line-height: 1.6; margin-top: 30px;">
                            This is your digital sanctuary. Minimalist tools designed for maximum focus. Precision in every pixel.
                        </p>
                    </div>`;
            } else if(type === 'drawing') {
                mount.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;">
                        <div><div class="label-mini">Creative_Space</div><div class="title">Canvas</div></div>
                        <div style="display:flex; gap:12px;">
                            <button onclick="dMode='pen'">Pen</button>
                            <button onclick="dMode='eraser'">Eraser</button>
                            <button onclick="undo('main')">Undo</button>
                            <button onclick="clearC('main')">Clear</button>
                        </div>
                    </div>
                    <div class="full-canvas-wrap"><canvas id="can-main"></canvas></div>`;
                setTimeout(() => initCanvas('can-main'), 50);
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div style="display:grid; grid-template-columns: 1fr 1.2fr; gap:60px; height: 75vh;">
                        <div style="display:flex; flex-direction:column; justify-content:center;">
                            <div id="c-res" style="font-family:'JetBrains Mono'; font-size:4rem; text-align:right; margin-bottom:40px;">0</div>
                            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
                                ${['C','/','*','-','7','8','9','+','4','5','6','sqrt','1','2','3','=','0','.','sin','cos'].map(k=>`<button onclick="calc('${k}')" style="height:65px; border-radius:20px;">${k}</button>`).join('')}
                            </div>
                        </div>
                        <div class="full-canvas-wrap">
                            <div style="position:absolute; top:20px; left:20px; z-index:10; display:flex; gap:10px;">
                                <button onclick="undo('calc')" style="padding:6px 14px; font-size:9px">Undo</button>
                                <button onclick="clearC('calc')" style="padding:6px 14px; font-size:9px">Clear</button>
                            </div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                setTimeout(() => initCanvas('can-calc'), 50);
            } else if(type === 'chat') {
                mount.innerHTML = `
                    <div id="chat-l" style="flex:1; overflow-y:auto; padding-bottom:100px;"></div>
                    <div style="position:fixed; bottom:60px; left:80px; right:80px;">
                        <input type="text" id="chat-i" class="cmd-line" placeholder="Message..." autocomplete="off">
                    </div>`;
                initChat();
            } else if(type === 'timing') {
                mount.innerHTML = `
                    <div class="title">Timing</div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:100px; margin-top:50px;">
                        <div>
                            <div class="label-mini">Stopwatch</div>
                            <div id="sw-v" style="font-family:'JetBrains Mono'; font-size:6rem;">00:00.0</div>
                            <div style="display:flex; gap:10px;"><button onclick="sw('s')">Start</button><button onclick="sw('p')">Pause</button><button onclick="sw('r')">Reset</button></div>
                        </div>
                        <div style="border-left:1px solid var(--s); padding-left:80px;">
                            <div class="label-mini">Timer</div>
                            <div id="tr-v" style="font-family:'JetBrains Mono'; font-size:6rem; color:#222;">00:00</div>
                            <input type="number" id="tr-in" placeholder="MIN" style="background:none; border:none; border-bottom:1px solid var(--s); color:#fff; font-size:2rem; width:100px; outline:none; margin-bottom:20px;">
                            <br><button onclick="tr('s')">Set</button><button onclick="tr('r')">Reset</button>
                        </div>
                    </div>`;
            } else if(type === 'weather') {
                mount.innerHTML = `
                    <div class="title">Los Angeles</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:30px; margin-top:60px;">
                        <div style="padding:40px; border-radius:30px; background:var(--accent)"><div class="label-mini">Yesterday</div><div class="title" style="font-size:3rem">19°C</div></div>
                        <div style="padding:40px; border-radius:30px; border:1px solid #fff"><div class="label-mini">Today</div><div id="w-now" class="title" style="font-size:3rem">0°C</div></div>
                        <div style="padding:40px; border-radius:30px; background:var(--accent)"><div class="label-mini">Tomorrow</div><div class="title" style="font-size:3rem">24°C</div></div>
                    </div>`;
                let t=0; let i=setInterval(()=>{if(t>=22){clearInterval(i)} document.getElementById('w-now').innerText=t+'°C'; t++},30);
            }
        }

        // --- Vocabulary 深度搜索 ---
        async function searchWord(word) {
            const resBox = document.getElementById('voc-res');
            resBox.innerHTML = `<div class="label-mini">Searching...</div>`;
            try {
                const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const d = await r.json();
                if(!d[0]) throw 'err';
                const main = d[0].meanings[0];
                
                // 这里手动模拟翻译逻辑（实际环境建议调用翻译API，此处展示排版）
                const transMap = {"hello":"你好 / 问候", "archive":"档案 / 存档", "minimalist":"极简主义者"};
                const chinese = transMap[word.toLowerCase()] || "词义解析中...";

                resBox.innerHTML = `
                    <div class="voc-layout">
                        <div class="voc-main">
                            <div class="label-mini">Entry</div>
                            <div class="entry">${word}</div>
                            <div class="voc-tag">${main.partOfSpeech}</div>
                            <p style="font-size:1.4rem; color:var(--sub); line-height:1.5;">${main.definitions[0].definition}</p>
                        </div>
                        <div class="voc-side">
                            <div class="voc-section">
                                <div class="label-mini">Chinese</div>
                                <div class="voc-chinese">${chinese}</div>
                            </div>
                            <div class="voc-section">
                                <div class="label-mini">Synonyms / Antonyms</div>
                                <div style="font-size:1.2rem;">
                                    <b>Syn:</b> ${main.synonyms.slice(0,2).join(', ') || 'None'}<br>
                                    <b>Ant:</b> ${main.antonyms.slice(0,2).join(', ') || 'None'}
                                </div>
                            </div>
                            <div class="voc-section">
                                <div class="label-mini">Example</div>
                                <div style="font-style:italic; border-left:2px solid #333; padding-left:20px; color:#ccc;">
                                    "${main.definitions[0].example || 'No example available.'}"
                                </div>
                            </div>
                        </div>
                    </div>`;
            } catch(e) { resBox.innerHTML = `<div class="title" style="font-size:2rem">Word not found.</div>`; }
        }

        // --- Drawing & Undo 系统 ---
        function initCanvas(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            const box = c.parentElement;
            c.width = box.offsetWidth; c.height = box.offsetHeight;
            let drawing = false;
            const push = () => { 
                let s = id==='can-main'?stacks.main:stacks.calc;
                if(s.length>20) s.shift(); s.push(c.toDataURL());
            };
            push();
            c.onmousedown = (e) => { drawing=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) push(); drawing=false; };
            c.onmousemove = (e) => {
                if(!drawing) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = 3; ctx.strokeStyle = (dMode==='eraser'&&id==='can-main')?'#080808':'#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undo = (t) => {
                const can = document.getElementById(t==='main'?'can-main':'can-calc');
                const s = t==='main'?stacks.main:stacks.calc;
                if(s.length>1) { s.pop(); let img=new Image(); img.src=s[s.length-1]; img.onload=()=> {can.getContext('2d').clearRect(0,0,can.width,can.height); can.getContext('2d').drawImage(img,0,0);}}
            };
            window.clearC = (t) => { 
                const can = document.getElementById(t==='main'?'can-main':'can-calc');
                can.getContext('2d').clearRect(0,0,can.width,can.height);
                if(t==='main') stacks.main=[]; else stacks.calc=[]; push();
            };
        }

        // --- Chat 系统 ---
        function initChat() {
            const i = document.getElementById('chat-i'), l = document.getElementById('chat-l');
            i.onkeypress = (e) => {
                if(e.key==='Enter' && i.value.trim()) {
                    const v = i.value.trim();
                    l.innerHTML += `<div style="text-align:right; margin-bottom:40px;"><div class="label-mini">You</div><div class="title" style="font-size:2.5rem">${v}</div></div>`;
                    i.value = '';
                    setTimeout(() => {
                        let r = "guess the password";
                        if(v==='Jefferson') r = "He is someone loved by Presley";
                        else if(v==='Presley') r = "She is not here";
                        else if(v==='15') r = "Look at the photos, they will help you";
                        else if(v==='16') r = "I like this, give it to me";
                        else if(v==='basketball') r = "Wait until we are both 18, I love you";
                        l.innerHTML += `<div style="margin-bottom:40px;"><div class="label-mini">Archive</div><div class="title" style="font-size:2.5rem; color:var(--sub)">${r}</div></div>`;
                        l.scrollTop = l.scrollHeight;
                    }, 500);
                }
            }
        }

        // --- 工具逻辑 ---
        let swMs=0;
        window.sw=(a)=>{
            const v=document.getElementById('sw-v');
            if(a==='s'&&!swInt) swInt=setInterval(()=>{swMs+=100; v.innerText=(swMs/1000).toFixed(1)+'s'},100);
            else if(a==='p'){clearInterval(swInt); swInt=null}
            else if(a==='r'){clearInterval(swInt); swInt=null; swMs=0; v.innerText="00:00.0"}
        };
        window.tr=(a)=>{
            const v=document.getElementById('tr-v');
            if(a==='s'){
                clearInterval(trInt); let s=(parseInt(document.getElementById('tr-in').value)||0)*60;
                v.style.color="#fff";
                trInt=setInterval(()=>{if(s<=0){clearInterval(trInt); v.style.color="red"; return} s--; v.innerText=`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`},1000);
            } else {clearInterval(trInt); v.innerText="00:00"; v.style.color="#222"}
        };
        let cV="";
        window.calc=(k)=>{
            const r=document.getElementById('c-res');
            if(k==='C')cV=""; else if(k==='='){try{cV=eval(cV.replace('sqrt','Math.sqrt').replace('sin','Math.sin')).toString()}catch{cV="Error"}} else cV+=k;
            r.innerText=cV||"0";
        }
    </script>
</body>
</html>
