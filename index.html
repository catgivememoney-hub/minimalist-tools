<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Hub v5</title>
    <style>
        :root {
            --bg: #121212;
            --text: #a0a0a0;
            --accent: #2c2c2c;
            --border: #333333;
            --input-bg: #1a1a1a;
        }

        * { box-sizing: border-box; font-family: "Helvetica Neue", sans-serif; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg); color: var(--text); overflow: hidden; }
        
        #back-btn { position: fixed; top: 30px; left: 30px; font-size: 24px; cursor: pointer; opacity: 0.4; display: none; z-index: 1000; }
        #la-timer { position: fixed; bottom: 30px; left: 30px; font-size: 11px; letter-spacing: 2px; opacity: 0.5; }

        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }

        input, button { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 10px; outline: none; }
        button { cursor: pointer; transition: 0.2s; background: var(--accent); font-size: 13px; }
        button:hover { background: var(--border); }

        .container { width: 95%; max-width: 1100px; height: 85vh; display: flex; flex-direction: column; }

        /* Vocabulary */
        #v-res { margin-top: 20px; line-height: 1.6; max-width: 600px; text-align: left; }
        .res-section { margin-bottom: 12px; border-left: 2px solid var(--border); padding-left: 15px; }

        /* Calculator */
        .calc-wrapper { display: grid; grid-template-columns: 350px 1fr; gap: 40px; height: 100%; }
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .calc-display { width: 100%; height: 60px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); text-align: right; font-size: 1.8rem; padding: 10px; margin-bottom: 10px; }

        /* Drawing */
        .draw-bar { display: flex; gap: 12px; margin-bottom: 15px; align-items: center; background: var(--accent); padding: 10px; border-radius: 4px; }
        canvas { background: var(--input-bg); border: 1px solid var(--border); cursor: crosshair; }

        /* Timing */
        .timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; width: 100%; }
        .time-box { border: 1px solid var(--border); padding: 40px; text-align: center; }
        .big-clock { font-size: 4.5rem; font-weight: 200; margin: 25px 0; font-variant-numeric: tabular-nums; }

        /* Chat */
        #chat-log { flex: 1; overflow-y: auto; padding: 20px; border: 1px solid var(--border); background: var(--input-bg); margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; max-width: 80%; border-radius: 2px; font-size: 14px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: var(--accent); color: #fff; }
        .ai-msg { align-self: flex-start; border-left: 2px solid var(--text); }
    </style>
</head>
<body>

    <div id="back-btn" onclick="goHome()">←</div>
    <div id="la-timer">LA TIME</div>

    <div id="home-screen" class="screen">
        <div style="margin-bottom: 25px; opacity: 0.6; letter-spacing: 2px;">WHAT DO YOU NEED?</div>
        <input type="text" id="main-cmd" placeholder="..." autocomplete="off" style="width: 320px; text-align: center; font-size: 1.2rem;">
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content" class="container"></div>
    </div>

    <script>
        const mainCmd = document.getElementById('main-cmd');
        const homeScreen = document.getElementById('home-screen');
        const appScreen = document.getElementById('app-screen');
        const appContent = document.getElementById('app-content');
        const backBtn = document.getElementById('back-btn');

        let swInt = null, trInt = null, swMs = 0, trSec = 0;
        let drawHistory = [], drawStep = -1;
        let currentMode = 'pen';
        let aiEnabled = false;

        mainCmd.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = mainCmd.value.toLowerCase().trim();
                const apps = ['vocabulary', 'calculator', 'drawing', 'timing', 'weather', 'chat'];
                if (apps.includes(val)) launchApp(val);
            }
        });

        function launchApp(type) {
            homeScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            backBtn.style.display = 'block';
            appContent.innerHTML = '';
            if(type === 'vocabulary') initVocab();
            else if(type === 'calculator') initCalc();
            else if(type === 'drawing') initDrawing();
            else if(type === 'timing') initTiming();
            else if(type === 'weather') initWeather();
            else if(type === 'chat') initChat();
        }

        function goHome() {
            homeScreen.classList.remove('hidden');
            appScreen.classList.add('hidden');
            backBtn.style.display = 'none';
            mainCmd.value = '';
            aiEnabled = false; 
            clearInterval(swInt); clearInterval(trInt);
        }

        function updateLA() {
            const now = new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false });
            document.getElementById('la-timer').innerText = `LA TIME: ${now}`;
        }
        setInterval(updateLA, 1000); updateLA();

        // --- 1. CHAT (彩蛋功能) ---
        function initChat() {
            appContent.innerHTML = `
                <div id="chat-log"><div class="msg ai-msg">Waiting for activation or command...</div></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="chat-in" placeholder="..." style="flex:1;">
                    <button id="chat-send">Send</button>
                </div>`;
            const input = document.getElementById('chat-in');
            const log = document.getElementById('chat-log');
            input.focus();

            const send = () => {
                const m = input.value.trim(); if(!m) return;
                const uMsg = document.createElement('div'); uMsg.className='msg user-msg'; uMsg.innerText=m;
                log.appendChild(uMsg); input.value='';

                if(m === '52015') {
                    aiEnabled = true;
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg'; aMsg.innerText="System: AI Mode Activated.";
                    log.appendChild(aMsg);
                } else if(aiEnabled) {
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg'; aMsg.innerText="Gemini: I am now processing your request...";
                    log.appendChild(aMsg);
                } else {
                    const aMsg = document.createElement('div'); aMsg.className='msg ai-msg'; aMsg.innerText="Error: Unauthorized access. Please enter code.";
                    log.appendChild(aMsg);
                }
                log.scrollTop = log.scrollHeight;
            };
            document.getElementById('chat-send').onclick = send;
            input.onkeypress = (e) => { if(e.key==='Enter') send(); };
        }

        // --- 2. VOCABULARY ---
        function initVocab() {
            appContent.innerHTML = `<input type="text" id="v-in" placeholder="Search..." style="width:100%;"><div id="v-res"></div>`;
            const vin = document.getElementById('v-in'); vin.focus();
            vin.onkeypress = async (e) => {
                if(e.key !== 'Enter') return;
                const word = vin.value.trim();
                const res = document.getElementById('v-res'); res.innerHTML = "Searching...";
                try {
                    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                    const data = await r.json();
                    if(!data[0]) throw "err";
                    const m = data[0].meanings[0];
                    const def = m.definitions[0];
                    res.innerHTML = `
                        <h2>${word}</h2>
                        <div class="res-section"><strong>[${m.partOfSpeech}]</strong></div>
                        <div class="res-section"><small>DEF:</small> ${def.definition}</div>
                        <div class="res-section"><small>SYN:</small> ${m.synonyms.slice(0,2).join(', ') || 'excellent, fine'}</div>
                        <div class="res-section"><small>ANT:</small> ${m.antonyms.slice(0,2).join(', ') || 'common, poor'}</div>
                        <div class="res-section" style="font-style:italic">" ${def.example || 'This is a '+word+' example.'} "</div>`;
                } catch { res.innerHTML = "Word not found."; }
            };
        }

        // --- 3. CALCULATOR + PAD ---
        let calcExp = "";
        function initCalc() {
            appContent.innerHTML = `
                <div class="calc-wrapper">
                    <div>
                        <div id="c-out" class="calc-display">0</div>
                        <div class="calc-grid">
                            ${['C','/','*','-','7','8','9','+','4','5','6','sqrt','1','2','3','=','0','.','sin','cos'].map(k => `<button onclick="doCalc('${k}')">${k}</button>`).join('')}
                        </div>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <canvas id="c-pad" width="600" height="450"></canvas>
                        <button onclick="clearCanvas('c-pad')" style="margin-top:10px;">Clear Pad</button>
                    </div>
                </div>`;
            initSketch('c-pad');
        }
        window.doCalc = (k) => {
            const out = document.getElementById('c-out');
            if(k === '=') { try { calcExp = eval(calcExp.replace('sqrt','Math.sqrt').replace('sin','Math.sin').replace('cos','Math.cos')); } catch { calcExp = "Error"; } }
            else if(k === 'C') calcExp = ""; else calcExp += k;
            out.innerText = calcExp || "0";
        };

        // --- 4. DRAWING (修复 Undo/Eraser) ---
        function initDrawing() {
            appContent.innerHTML = `
                <div class="draw-bar">
                    <input type="color" id="d-col" value="#a0a0a0" style="width:30px;height:30px;border:none;background:none;">
                    <button onclick="currentMode='pen'">Pen</button>
                    <button onclick="currentMode='eraser'">Eraser</button>
                    <input type="range" id="d-sz" min="1" max="50" value="2">
                    <button onclick="undo()">Undo</button>
                    <button onclick="redo()">Redo</button>
                    <button onclick="clearCanvas('d-can')">Clear</button>
                    <button onclick="saveD()">Save</button>
                </div>
                <canvas id="d-can" width="1050" height="500"></canvas>`;
            initSketch('d-can', true);
        }

        // --- 5. TIMING ---
        function initTiming() {
            appContent.innerHTML = `
                <div class="timing-grid">
                    <div class="time-box"><h3>STOPWATCH</h3><div id="sw" class="big-clock">00:00:00</div>
                        <button onclick="swFunc('start')">Start</button><button onclick="swFunc('stop')">Stop</button><button onclick="swFunc('reset')">Reset</button>
                    </div>
                    <div class="time-box"><h3>TIMER</h3><div id="tr" class="big-clock">00:00:00</div>
                        <input type="number" id="tr-in" placeholder="Mins" style="width:80px;text-align:center;">
                        <button onclick="trFunc('start')">Start</button><button onclick="trFunc('reset')">Reset</button>
                    </div>
                </div>`;
        }
        window.swFunc = (a) => {
            const d = document.getElementById('sw');
            if(a==='start'){ if(swInt)return; swInt=setInterval(()=>{swMs+=1000; let t=new Date(swMs); d.innerText=t.toISOString().substr(11,8)},1000); }
            else if(a==='stop'){ clearInterval(swInt); swInt=null; }
            else { clearInterval(swInt); swInt=null; swMs=0; d.innerText="00:00:00"; }
        };
        window.trFunc = (a) => {
            const d = document.getElementById('tr');
            if(a==='start'){
                clearInterval(trInt); trSec = (parseInt(document.getElementById('tr-in').value)||0)*60;
                trInt = setInterval(()=>{
                    if(trSec<=0){ clearInterval(trInt); alert("Time's up"); return; }
                    trSec--; let m=Math.floor(trSec/60), s=trSec%60;
                    d.innerText=`00:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                },1000);
            } else { clearInterval(trInt); d.innerText="00:00:00"; }
        };

        // --- 6. WEATHER ---
        function initWeather() {
            let off = 0; const update = () => {
                const label = off === 0 ? "TODAY" : (off === -1 ? "YESTERDAY" : "TOMORROW");
                appContent.innerHTML = `<div style="text-align:center;"><h2 style="opacity:0.3;">${label}</h2><div style="font-size:7rem;margin:30px 0;">${22+off}°C</div><p>LOS ANGELES</p>
                <div style="margin-top:40px;"><button onclick="wMove(-1)">←</button><button onclick="wMove(1)">→</button></div></div>`;
            };
            window.wMove = (n) => { off=Math.max(-1, Math.min(1, off+n)); update(); }; update();
        }

        // --- SHARED DRAW LOGIC ---
        function initSketch(id, isFull = false) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            let drawing = false;
            drawHistory = []; drawStep = -1;
            const pushS = () => { if(!isFull) return; drawStep++; if(drawStep < drawHistory.length) drawHistory.length = drawStep; drawHistory.push(c.toDataURL()); };
            if(isFull) pushS();
            c.onmousedown = (e) => { drawing = true; ctx.beginPath(); const r = c.getBoundingClientRect(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top); };
            c.onmouseup = () => { if(drawing && isFull) pushS(); drawing = false; };
            c.onmousemove = (e) => {
                if(!drawing) return; const r = c.getBoundingClientRect();
                ctx.lineWidth = isFull ? document.getElementById('d-sz').value : 2;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                if(isFull && currentMode==='eraser') ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--input-bg');
                else ctx.strokeStyle = isFull ? document.getElementById('d-col').value : '#555';
                ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke();
            };
            window.undo = () => { if(drawStep>0){ drawStep--; let i=new Image(); i.src=drawHistory[drawStep]; i.onload=()=> {ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(i,0,0);}}; };
            window.redo = () => { if(drawStep<drawHistory.length-1){ drawStep++; let i=new Image(); i.src=drawHistory[drawStep]; i.onload=()=> {ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(i,0,0);}}; };
            window.clearCanvas = (cid) => { document.getElementById(cid).getContext('2d').clearRect(0,0,c.width,c.height); if(isFull){drawHistory=[]; drawStep=-1; pushS();} };
            window.saveD = () => { const l=document.createElement('a'); l.download='draw.png'; l.href=c.toDataURL(); l.click(); };
        }
    </script>
</body>
</html>
