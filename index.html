<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive OS v28 // Final Stability</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #1a1a1a;
            --sub: #555;
            --accent: #fff;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            background: var(--bg); color: var(--p); 
            font-family: 'Lexend', sans-serif; overflow: hidden; 
        }

        /* 顶部导航层 */
        #hud { position: fixed; top: 30px; left: 40px; z-index: 9999; }
        #exit-btn { 
            font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--p);
            cursor: pointer; display: none; border: 1px solid #333;
            padding: 8px 20px; border-radius: 100px; backdrop-filter: blur(20px);
        }
        #exit-btn.active { display: block; }
        #exit-btn:hover { background: #fff; color: #000; }

        /* 核心布局架构 - 防止遮挡 */
        .master-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px 80px;
        }

        /* 搜索区域：固定高度，绝不重叠 */
        .search-area {
            flex-shrink: 0;
            padding-top: 40px;
            margin-bottom: 40px;
        }
        .label-mini { font-size: 10px; color: var(--sub); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
        .master-input { 
            background: transparent; border: none; color: #fff; 
            font-size: 3.5rem; font-weight: 800; width: 100%;
            outline: none; border-bottom: 2px solid var(--s); transition: 0.4s;
            padding-bottom: 10px;
        }
        .master-input:focus { border-bottom-color: #fff; }

        /* 内容挂载区：自动滚动 */
        #mount {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 40px;
            scrollbar-width: none;
        }
        #mount::-webkit-scrollbar { display: none; }

        /* 模块排版 */
        .title-huge { font-size: 5.5rem; font-weight: 800; letter-spacing: -4px; line-height: 0.9; margin: 0 0 20px 0; }
        .desc-text { font-size: 1.5rem; color: var(--sub); line-height: 1.6; max-width: 800px; font-weight: 300; }
        
        button { 
            background: #111; border: 1px solid #222; color: #fff; 
            padding: 10px 22px; font-size: 11px; font-weight: 600; border-radius: 50px;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #fff; color: #000; }

        /* Vocabulary 结果页布局 */
        .voc-container { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; animation: slideUp 0.6s var(--ease); }
        .voc-tag { display: inline-block; padding: 4px 12px; background: #fff; color: #000; border-radius: 5px; font-size: 11px; font-weight: 800; margin-bottom: 20px; }
        .voc-meta { border-left: 1px solid #1a1a1a; padding-left: 50px; }
        .voc-label { font-size: 10px; color: var(--sub); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }
        .voc-content { font-size: 1.8rem; font-weight: 600; margin-bottom: 35px; color: #eee; }

        /* Canvas & Calculator */
        .canvas-box { height: 500px; background: #050505; border-radius: 40px; border: 1px solid #1a1a1a; position: relative; width: 100%; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="hud"><div id="exit-btn" onclick="goHome()">SYSTEM_EXIT</div></div>

    <div class="master-wrapper">
        <div class="search-area">
            <div id="mode-label" class="label-mini">COMMAND_INTERFACE</div>
            <input type="text" id="main-in" class="master-input" placeholder="Enter Command..." autocomplete="off" autofocus>
        </div>

        <div id="mount">
            <div class="title-huge">Archive OS.</div>
            <p class="desc-text">Version 28 Elite. A refined digital sanctuary. Type 'hello' to begin.</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('main-in');
        const mount = document.getElementById('mount');
        const exitBtn = document.getElementById('exit-btn');
        const modeLabel = document.getElementById('mode-label');

        let swInt, trInt, dMode = 'pen';
        let stacks = { main: [], calc: [] };
        let appState = 'home';

        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = input.value.toLowerCase().trim();
                if(appState === 'home') {
                    if(['hello','drawing','timing','weather','chat','vocabulary','calculator'].includes(val)) launch(val);
                } else if(appState === 'vocabulary') {
                    searchWord(val);
                } else if(appState === 'chat') {
                    handleChat(val);
                }
            }
        });

        function launch(type) {
            appState = type;
            modeLabel.innerText = `MODE / ${type.toUpperCase()}`;
            exitBtn.classList.add('active');
            input.value = '';
            input.placeholder = (type === 'vocabulary') ? "Search word..." : (type === 'chat' ? "Say something..." : "");
            render(type);
        }

        function goHome() {
            clearInterval(swInt); clearInterval(trInt);
            appState = 'home';
            modeLabel.innerText = `COMMAND_INTERFACE`;
            exitBtn.classList.remove('active');
            input.value = '';
            input.placeholder = "Enter Command...";
            mount.innerHTML = `<div class="title-huge">Archive OS.</div><p class="desc-text">Version 28 Elite. A refined digital sanctuary.</p>`;
            input.focus();
        }

        function render(type) {
            mount.innerHTML = '';
            if(type === 'hello') {
                mount.innerHTML = `<div class="title-huge">Hello.</div><p class="desc-text">Welcome to your workspace. This system is designed for focus, removing every unnecessary element to let your mind breathe.</p>`;
            } else if(type === 'vocabulary') {
                mount.innerHTML = `<div id="voc-out" class="desc-text">Ready to analyze language...</div>`;
            } else if(type === 'chat') {
                mount.innerHTML = `<div id="chat-flow" style="display:flex; flex-direction:column; gap:40px;"></div>`;
            } else if(type === 'drawing') {
                mount.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                        <div class="label-mini">Creative Canvas</div>
                        <div style="display:flex; gap:10px;">
                            <button onclick="dMode='pen'">Pen</button><button onclick="dMode='eraser'">Eraser</button>
                            <button onclick="undo('main')">Undo</button><button onclick="clearC('main')">Clear</button>
                        </div>
                    </div>
                    <div class="canvas-box"><canvas id="can-main"></canvas></div>`;
                setTimeout(() => initDraw('can-main'), 50);
            } else if(type === 'calculator') {
                mount.innerHTML = `
                    <div style="display:grid; grid-template-columns: 1fr 1.5fr; gap:60px; height: 100%;">
                        <div>
                            <div id="c-res" style="font-family:'JetBrains Mono'; font-size:4.5rem; text-align:right; margin-bottom:30px; height:100px;">0</div>
                            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
                                ${['C','/','*','-','7','8','9','+','4','5','6','sqrt','1','2','3','=','0','.','sin','cos'].map(k=>`<button onclick="calc('${k}')" style="height:70px; border-radius:15px; font-size:14px">${k}</button>`).join('')}
                            </div>
                        </div>
                        <div class="canvas-box">
                            <div style="position:absolute; top:20px; left:20px; z-index:10; display:flex; gap:10px;">
                                <button onclick="undo('calc')">Undo</button><button onclick="clearC('calc')">Clear</button>
                            </div>
                            <canvas id="can-calc"></canvas>
                        </div>
                    </div>`;
                setTimeout(() => initDraw('can-calc'), 50);
            } else if(type === 'weather') {
                mount.innerHTML = `
                    <div class="title-huge" style="font-size:3rem">Climate.</div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:30px; margin-top:40px;">
                        <div style="padding:40px; border-radius:30px; background:#080808"><div class="label-mini">Yesterday</div><div style="font-size:3rem; font-weight:800;">18°C</div></div>
                        <div style="padding:40px; border-radius:30px; border:1px solid #fff"><div class="label-mini">Today</div><div id="w-now" style="font-size:3rem; font-weight:800;">0°C</div></div>
                        <div style="padding:40px; border-radius:30px; background:#080808"><div class="label-mini">Tomorrow</div><div style="font-size:3rem; font-weight:800;">24°C</div></div>
                    </div>`;
                let t=0; let itv=setInterval(()=>{if(t>=22){clearInterval(itv)} document.getElementById('w-now').innerText=t+'°C'; t++},30);
            }
        }

        // --- Vocabulary: 离线+在线双重补全 ---
        async function searchWord(w) {
            const out = document.getElementById('voc-out');
            out.innerHTML = "Processing...";
            
            const offline = {
                "hello": {cn: "你好 / 问候", syn: "greeting, welcome", ant: "goodbye", sent: "He smiled and said hello to everyone.", pos: "noun / interjection"},
                "jefferson": {cn: "杰斐逊 (美国政治家)", syn: "statesman, founder", ant: "None", sent: "Jefferson believed in the power of education.", pos: "proper noun"},
                "presley": {cn: "普雷斯利 (猫王)", syn: "singer, icon", ant: "None", sent: "Presley's music changed the world forever.", pos: "proper noun"}
            };

            let data;
            try {
                const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);
                const d = await r.json();
                if(d[0]) {
                    const m = d[0].meanings[0];
                    data = {
                        cn: offline[w]?.cn || "翻译检索中...",
                        syn: m.synonyms.slice(0,2).join(', ') || offline[w]?.syn || "N/A",
                        ant: m.antonyms.slice(0,2).join(', ') || offline[w]?.ant || "N/A",
                        sent: m.definitions[0].example || offline[w]?.sent || "Usage example not found.",
                        pos: m.partOfSpeech
                    };
                }
            } catch(e) {}

            if(!data) data = offline[w] || {cn: "未收录", syn: "N/A", ant: "N/A", sent: "No example.", pos: "unknown"};

            out.innerHTML = `
                <div class="voc-container">
                    <div>
                        <div class="title-huge" style="font-size:4rem">${w}</div>
                        <div class="voc-tag">${data.pos}</div>
                        <p class="desc-text" style="color:#fff; font-size:1.6rem">${data.cn}</p>
                    </div>
                    <div class="voc-meta">
                        <div class="voc-label">Synonyms</div><div class="voc-content">${data.syn}</div>
                        <div class="voc-label">Antonyms</div><div class="voc-content">${data.ant}</div>
                        <div class="voc-label">Usage Sentence</div><div class="voc-content" style="font-style:italic; font-weight:300">"${data.sent}"</div>
                    </div>
                </div>`;
        }

        // --- Chat: 逻辑精准修复 ---
        function handleChat(v) {
            const flow = document.getElementById('chat-flow');
            flow.innerHTML += `<div style="text-align:right"><div class="label-mini">You</div><div style="font-size:2rem; font-weight:800">${v}</div></div>`;
            input.value = '';
            setTimeout(() => {
                let r = "guess the password";
                if(v==='jefferson') r = "He is someone loved by Presley";
                else if(v==='presley') r = "She is not here";
                else if(v==='15') r = "Look at the photos, they will help you";
                else if(v==='16') r = "I like this, give it to me";
                else if(v==='basketball') r = "Wait until we are both 18, I love you";
                flow.innerHTML += `<div><div class="label-mini">Archive</div><div style="font-size:2rem; font-weight:800; color:var(--sub)">${r}</div></div>`;
                mount.scrollTop = mount.scrollHeight;
            }, 300);
        }

        // --- Drawing & Undo System ---
        function initDraw(id) {
            const c = document.getElementById(id), ctx = c.getContext('2d');
            const box = c.parentElement;
            c.width = box.offsetWidth; c.height = box.offsetHeight;
            let drawing = false;
            const push = () => { let s=id==='can-main'?stacks.main:stacks.calc; if(s.length>25)s.shift(); s.push(c.toDataURL()); };
            push();
            c.onmousedown = (e) => { drawing=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) push(); drawing=false; };
            c.onmousemove = (e) => {
                if(!drawing) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = 3; ctx.strokeStyle = (dMode==='eraser'&&id==='can-main')?'#050505':'#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.undo = (t) => {
                const can = document.getElementById(t==='main'?'can-main':'can-calc');
                const s = t==='main'?stacks.main:stacks.calc;
                if(s.length>1) { s.pop(); let img=new Image(); img.src=s[s.length-1]; img.onload=()=>{can.getContext('2d').clearRect(0,0,can.width,can.height); can.getContext('2d').drawImage(img,0,0);}}
            };
            window.clearC = (t) => { const can=document.getElementById(t==='main'?'can-main':'can-calc'); can.getContext('2d').clearRect(0,0,can.width,can.height); stacks[t==='main'?'main':'calc']=[]; push(); };
        }

        // --- Utils: Calculator ---
        let calcVal = "";
        window.calc = (k) => {
            const r = document.getElementById('c-res');
            if(k==='C') calcVal="";
            else if(k==='='){ try{calcVal=eval(calcVal.replace(/sqrt/g,'Math.sqrt').replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos')).toString()}catch{calcVal="Error"} }
            else calcVal += k;
            r.innerText = calcVal || "0";
        }
    </script>
</body>
</html>
