<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive v19 // Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;900&family=JetBrains+Mono:wght@400&display=swap');

        :root {
            --bg: #000;
            --p: #fff;
            --s: #666;
            --accent: #fff;
            --ease: cubic-bezier(0.2, 1, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--p); font-family: 'Inter', sans-serif; overflow: hidden; }

        /* 全局 HUD */
        #hud { position: fixed; top: 40px; left: 40px; right: 40px; display: flex; justify-content: space-between; z-index: 1000; pointer-events: none; }
        #exit-btn { 
            pointer-events: auto; font-size: 10px; font-weight: 900; letter-spacing: 4px; 
            color: var(--p); cursor: pointer; opacity: 0; transition: 0.6s var(--ease);
            text-transform: uppercase; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px;
        }
        #exit-btn:hover { background: #fff; color: #000; }
        #exit-btn.active { opacity: 1; }
        #la-time { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--s); margin-top: 10px; }

        /* 屏显逻辑 */
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; transition: 1s var(--ease); padding: 100px 80px; }
        .hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        
        /* 首页专用排版 */
        #home-screen { justify-content: center; align-items: center; text-align: center; }
        #cmd-input { 
            background: transparent; border: none; color: #fff; padding: 20px 0; 
            font-size: 2.5rem; font-weight: 900; width: 400px; text-align: center;
            outline: none; border-bottom: 2px solid #222; transition: 0.5s var(--ease);
        }
        #cmd-input:focus { width: 550px; border-bottom-color: #fff; }

        /* 模块排版 */
        .module-header { margin-bottom: 60px; }
        .module-title { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin: 0; text-transform: uppercase; }
        .module-sub { font-size: 10px; font-weight: 500; letter-spacing: 6px; color: var(--s); text-transform: uppercase; margin-bottom: 10px; }

        /* 按钮与交互 */
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        button { 
            background: transparent; border: 1px solid #333; color: #fff; 
            padding: 12px 24px; font-size: 10px; font-weight: 900; letter-spacing: 2px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { border-color: #fff; }
        button.primary { background: #fff; color: #000; border-color: #fff; }

        /* Drawing & Tools */
        .tool-bar { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; background: #111; padding: 10px 20px; width: fit-content; }
        canvas { background: #000; border: 1px solid #222; width: 100%; height: 60vh; cursor: crosshair; }
        input[type=range] { -webkit-appearance: none; background: #333; height: 2px; width: 100px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 100px; background: #fff; cursor: pointer; }

        /* Timing Layout */
        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 100px; }
        .time-val { font-size: 6rem; font-weight: 900; font-family: 'JetBrains Mono'; margin: 20px 0; letter-spacing: -4px; }
        input.time-in { background: transparent; border: none; border-bottom: 2px solid #222; color: #fff; font-size: 1.5rem; font-weight: 900; width: 100px; outline: none; margin-bottom: 20px; }
    </style>
</head>
<body onclick="playSilence()">

    <div id="hud">
        <div id="exit-btn" onclick="exit()">Back / Exit</div>
        <div id="la-time">LA 00:00:00</div>
    </div>

    <div id="home-screen" class="screen">
        <div class="module-sub">Command Interface</div>
        <input type="text" id="cmd-input" placeholder="Type command..." autocomplete="off" autofocus>
    </div>

    <div id="app-screen" class="screen hidden">
        <div id="app-content"></div>
    </div>

    <script>
        // --- 核心逻辑 ---
        const cmdInput = document.getElementById('cmd-input');
        const appContent = document.getElementById('app-content');
        
        function playSilence() { document.body.onclick = null; }

        cmdInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                const val = cmdInput.value.toLowerCase().trim();
                const apps = ['hello','drawing','timing','chat','vocabulary','weather','calculator'];
                if(apps.includes(val)) launch(val);
            }
        });

        function launch(type) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('exit-btn').classList.add('active');
            render(type);
        }

        function exit() {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('home-screen').classList.remove('hidden');
            document.getElementById('exit-btn').classList.remove('active');
            cmdInput.value = '';
            clearInterval(swInt); clearInterval(trInt);
        }

        function render(type) {
            appContent.innerHTML = '';
            if(type === 'hello') {
                appContent.innerHTML = `
                    <div class="module-header">
                        <div class="module-sub">Archive OS v19</div>
                        <div class="module-title">Sanctuary.</div>
                    </div>
                    <p style="font-size:1.2rem; color:#888; max-width:600px; line-height:1.6">
                        A focused environment for deep thought. All tools are refined to their purest state. 
                        No distractions. No noise. Only clarity.
                    </p>`;
            } else if(type === 'timing') {
                appContent.innerHTML = `
                    <div class="timer-grid">
                        <div>
                            <div class="module-sub">Stopwatch</div>
                            <div id="sw-v" class="time-val">00:00</div>
                            <div class="btn-group">
                                <button onclick="sw('s')">Start</button>
                                <button onclick="sw('p')">Stop</button>
                                <button onclick="sw('r')">Reset</button>
                            </div>
                        </div>
                        <div>
                            <div class="module-sub">Timer</div>
                            <div id="tr-v" class="time-val" style="color:#222">00:00</div>
                            <input type="number" id="tr-i" class="time-in" placeholder="MINS">
                            <div class="btn-group">
                                <button class="primary" onclick="tr()">Set Timer</button>
                                <button onclick="trReset()">Reset</button>
                            </div>
                        </div>
                    </div>`;
            } else if(type === 'drawing') {
                appContent.innerHTML = `
                    <div class="tool-bar">
                        <button onclick="dMode='pen'">Pen</button>
                        <button onclick="dMode='eraser'">Eraser</button>
                        <input type="range" id="d-s" min="1" max="100" value="2">
                        <button onclick="dUndo()">Undo</button>
                        <button onclick="dClear()">Clear Canvas</button>
                        <button class="primary" onclick="dSave()">Export</button>
                    </div>
                    <canvas id="can"></canvas>`;
                initD();
            } else if(type === 'chat') {
                appContent.innerHTML = `
                    <div id="chat-l" style="height:55vh; overflow-y:auto; margin-bottom:40px; border-left:1px solid #111; padding-left:30px"></div>
                    <input type="text" id="chat-i" placeholder="Message..." style="background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-size:1.5rem; width:100%; outline:none; padding:10px 0;">`;
                initC();
            } else if(type === 'vocabulary') {
                appContent.innerHTML = `
                    <input type="text" id="v-i" placeholder="Enter word..." style="background:transparent; border:none; border-bottom:1px solid #333; color:#fff; font-size:3rem; font-weight:900; width:100%; outline:none;">
                    <div id="v-o" style="margin-top:40px"></div>`;
                const vi = document.getElementById('v-i'); vi.focus();
                vi.onkeypress = async (e) => {
                    if(e.key === 'Enter') {
                        const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${vi.value}`);
                        const d = await r.json();
                        if(d[0]) {
                            const def = d[0].meanings[0].definitions[0].definition;
                            document.getElementById('v-o').innerHTML = `<div class="module-title">${vi.value}</div><p style="font-size:1.5rem; color:#888; margin-top:20px">${def}</p>`;
                        }
                    }
                }
            } else if(type === 'weather') {
                appContent.innerHTML = `<div class="module-sub">Los Angeles</div><div class="time-val" style="font-size:10rem">22°C</div><button onclick="exit()">Refresh</button>`;
            } else if(type === 'calculator') {
                appContent.innerHTML = `<div id="c-r" class="time-val" style="text-align:right">0</div><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px">${['C','/','*','-','7','8','9','+','4','5','6','Math.sqrt','1','2','3','=','0','.','Math.sin','Math.cos'].map(k=>`<button onclick="cE('${k}')">${k.replace('Math.','')}</button>`).join('')}</div>`;
            }
        }

        // --- 功能细节实现 ---
        let swMs = 0, swInt = null, trInt = null;
        window.sw = (m) => {
            if(m==='s' && !swInt) swInt = setInterval(()=>{swMs++; document.getElementById('sw-v').innerText=new Date(swMs*1000).toISOString().substr(14,5)},1000);
            else if(m==='p') { clearInterval(swInt); swInt=null; }
            else if(m==='r') { clearInterval(swInt); swInt=null; swMs=0; document.getElementById('sw-v').innerText="00:00"; }
        };
        window.tr = () => {
            clearInterval(trInt);
            let s = (parseInt(document.getElementById('tr-i').value)||0)*60;
            const v = document.getElementById('tr-v'); v.style.color="#fff";
            trInt = setInterval(()=>{
                if(s<=0){clearInterval(trInt); alert("Timer Done"); return;}
                s--; v.innerText = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
            },1000);
        };
        window.trReset = () => { clearInterval(trInt); document.getElementById('tr-v').innerText="00:00"; document.getElementById('tr-v').style.color="#222"; };

        function initD() {
            const c = document.getElementById('can'), ctx = c.getContext('2d');
            c.width = c.offsetWidth; c.height = c.offsetHeight;
            let drawing = false, h = [];
            window.dMode = 'pen';
            const s = () => { h.push(c.toDataURL()); if(h.length>10) h.shift(); }; s();
            c.onmousedown = (e) => { drawing=true; ctx.beginPath(); const r=c.getBoundingClientRect(); ctx.moveTo(e.clientX-r.left, e.clientY-r.top); };
            c.onmouseup = () => { if(drawing) s(); drawing=false; };
            c.onmousemove = (e) => {
                if(!drawing) return; const r=c.getBoundingClientRect();
                ctx.lineWidth = document.getElementById('d-s').value;
                ctx.strokeStyle = dMode==='eraser'?'#000':'#fff';
                ctx.lineCap='round'; ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();
            };
            window.dUndo = () => { if(h.length>1){ h.pop(); let i=new Image(); i.src=h[h.length-1]; i.onload=()=> {ctx.clearRect(0,0,c.width,c.height); ctx.drawImage(i,0,0);}} };
            window.dClear = () => { ctx.clearRect(0,0,c.width,c.height); s(); };
            window.dSave = () => { const a=document.createElement('a'); a.download='art.png'; a.href=c.toDataURL(); a.click(); };
        }

        function initC() {
            const i = document.getElementById('chat-i'), l = document.getElementById('chat-l');
            i.onkeypress = (e) => {
                if(e.key==='Enter' && i.value.trim()){
                    l.innerHTML += `<div style="margin-bottom:30px"><div class="module-sub">You</div><div style="font-size:1.5rem; font-weight:900">${i.value}</div></div>`;
                    const v = i.value; i.value = '';
                    setTimeout(()=>{
                        let r = "Acknowledged. All systems optimal.";
                        if(v==='Jefferson') r = "I love you Presley";
                        l.innerHTML += `<div style="margin-bottom:30px; color:#666"><div class="module-sub">AI</div><div style="font-size:1.5rem; font-weight:500">${r}</div></div>`;
                        l.scrollTop = l.scrollHeight;
                    },400);
                }
            }
        }

        let cE_v = "";
        window.cE = (k) => { if(k==='C') cE_v=""; else if(k==='=') cE_v=eval(cE_v).toString(); else cE_v+=k; document.getElementById('c-r').innerText = cE_v || "0"; };

        setInterval(() => {
            document.getElementById('la-time').innerText = `LA ${new Date().toLocaleTimeString('en-US', { timeZone: 'America/Los_Angeles', hour12: false })}`;
        }, 1000);
    </script>
</body>
</html>
